<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Control Docente · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paleta Luminosa, Clara y Relajante */
    --c-cream-bg: #FBE4D8;   
    --c-nude-soft: #DFB6B2;  
    --c-berry-accent: #854F6C; 
    --c-plum-text: #522B5B;    
    --c-fine-dark: #2B124C;    
    
    --shadow-floating: 0 25px 50px rgba(82, 43, 91, 0.12), 0 10px 20px rgba(0, 0, 0, 0.03);
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--c-cream-bg) 50%, var(--c-nude-soft) 100%);
    background-attachment: fixed;
    color: var(--c-fine-dark);
    min-height: 100vh;
    padding: 50px 20px;
    -webkit-font-smoothing: antialiased;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  .inst-title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--c-fine-dark);
    line-height: 1.3;
  }

  .docente-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-style: italic;
    font-weight: 600;
    color: var(--c-berry-accent);
    margin-top: 8px;
    letter-spacing: 2px;
  }

  /* CONTENEDOR PRINCIPAL */
  .dashboard-container {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    background: #FFFFFF;
    border: 1px solid rgba(223, 182, 178, 0.5);
    border-radius: 32px;
    padding: 45px;
    box-shadow: 0 40px 80px rgba(82, 43, 91, 0.06);
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--c-cream-bg);
    padding-bottom: 25px;
    margin-bottom: 35px;
  }

  .panel-title h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--c-plum-text);
  }

  .panel-title p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--c-berry-accent);
  }

  .institution-logo {
    width: 90px;
    height: 90px;
    object-fit: contain;
    border-radius: 50%;
    border: 2px solid var(--c-nude-soft);
    background: #FFFFFF;
    padding: 3px;
  }

  /* LISTADO DE ESTUDIANTES CON EFECTO FLOTANTE */
  .students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 30px;
  }

  .student-card {
    background: #FFFFFF;
    border: 1px solid rgba(223, 182, 178, 0.3);
    border-radius: 24px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: var(--shadow-floating);
    animation: floatingAnimation 5s ease-in-out infinite alternate;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .student-card:nth-child(even) {
    animation-delay: 2.5s;
  }

  .student-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 35px 70px rgba(82, 43, 91, 0.18), 0 12px 25px rgba(0, 0, 0, 0.04);
  }

  @keyframes floatingAnimation {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-6px); }
  }

  /* FOTOGRAFÍAS DE LOS ALUMNOS */
  .student-photo-frame {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 2px solid var(--c-nude-soft);
    background: var(--c-cream-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 6px 15px rgba(82, 43, 91, 0.08);
  }

  .student-photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .student-details {
    flex-grow: 1;
    overflow: hidden;
  }

  .student-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--c-fine-dark);
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
  }

  .student-id {
    font-size: 12px;
    color: var(--c-berry-accent);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    background: var(--c-cream-bg);
    color: var(--c-plum-text);
    padding: 4px 12px;
    border-radius: 12px;
    margin-top: 10px;
    border: 1px solid rgba(223, 182, 178, 0.4);
  }

  /* REPRODUCTOR DE PIANO ACÚSTICO */
  .music-player {
    position: fixed;
    bottom: 35px;
    right: 35px;
    background: #ffffff;
    border: 1px solid var(--c-nude-soft);
    border-radius: 30px;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(82, 43, 91, 0.06);
    z-index: 100;
    cursor: pointer;
    color: var(--c-fine-dark);
    transition: all 0.3s;
  }
  
  .music-player:hover {
    transform: translateY(-3px);
  }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="dashboard-container">
  
  <div class="top-bar">
    <div class="panel-title">
      <h2>Panel de Control Docente</h2>
      <p>Gestión de matrícula escolar, expedientes y registros de evaluación</p>
    </div>
    <img src="logo.png?v=2" alt="Logo Instituto Polivalente San Pedro de Tutule" class="institution-logo">
  </div>

  <div class="students-grid" id="students-list-container">
    </div>

</div>

<div class="music-player" onclick="toggleMusic()">
  <span id="music-icon">🎹</span>
  <span id="music-text">Piano Acústico: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;

function cargarPanelDocente() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(response => { if (!response.ok) throw new Error(); return response.json(); })
    .then(data => { 
      NOTAS_ALUMNOS = data;
      renderizarEstudiantes();
    })
    .catch(err => { 
      document.getElementById('students-list-container').innerHTML = `<p style="color: #A34343; font-weight: 500;">Error al conectar con la base de datos 'notas_alumnos.json'. Verifica el archivo.</p>`;
    });
}

function renderizarEstudiantes() {
  const container = document.getElementById('students-list-container');
  container.innerHTML = '';

  Object.keys(NOTAS_ALUMNOS).forEach(id => {
    const alumno = NOTAS_ALUMNOS[id];
    const card = document.createElement('div');
    card.className = 'student-card';

    // Validación y asignación automática de la imagen del alumno
    let fotoHtml = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2B124C" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    if (alumno.foto && alumno.foto.trim() !== "") {
      fotoHtml = `<img src="${alumno.foto}" alt="Fotografía de ${alumno.nombre}">`;
    }

    card.innerHTML = `
      <div class="student-photo-frame">
        ${fotoHtml}
      </div>
      <div class="student-details">
        <div class="student-name">${alumno.nombre}</div>
        <div class="student-id">Identidad: ${id}</div>
        <span class="status-badge">Expediente Activo</span>
      </div>
    `;
    container.appendChild(card);
  });
}

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) {
    audio.play().catch(() => {});
    document.getElementById('music-text').innerText = "Piano Acústico: On";
    document.getElementById('music-icon').innerText = "⏸️";
    musicPlaying = true;
  } else {
    audio.pause();
    document.getElementById('music-text').innerText = "Piano Acústico: Off";
    document.getElementById('music-icon').innerText = "🎹";
    musicPlaying = false;
  }
}

window.onload = cargarPanelDocente;
</script>
</body>
</html>
