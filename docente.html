<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Privado de la Docente Karla Castro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* PALETA DE COLORES IDÉNTICA A LA DEL ALUMNO */
  --canvas: #FBE4D8;   
  --canvas2: #DFB6B2;  
  --linen: #EBF2EE; 
  --sage: #854F6C;        /* Berry accent */
  --sage-dark: #522B5B;   /* Plum text */
  --sage-light: #2B124C;  /* Fine dark */
  --text: #2B124C;        
  --text-muted: #854F6C; 
  --white: #FFFFFF;
  --border: #DFB6B2; 
  --border-dark: rgba(223, 182, 178, 0.7); 
  --pass: #2E7D52; 
  --fail: #A64444;
  --radius: 32px; 
  --radius-sm: 14px; 
  --shadow: 0 30px 60px rgba(82, 43, 91, 0.06), 0 12px 25px rgba(0, 0, 0, 0.02);
}
body{ 
  background: linear-gradient(135deg, #FFFFFF 0%, var(--canvas) 50%, var(--canvas2) 100%); 
  background-attachment: fixed;
  font-family: 'Inter', sans-serif; 
  color: var(--text); 
  min-height: 100vh; 
}
.site-header{ 
  padding: 40px 24px; 
  text-align: center; 
  color: var(--sage-light); 
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.logo-colegio { 
  width: 90px; height: 90px; background: #fff; border-radius: 50%; padding: 4px; display: flex; align-items: center; justify-content: center; 
  box-shadow: 0 12px 28px rgba(82, 43, 91, 0.08); border: 2px solid var(--canvas2);
}
.logo-colegio img { width: 100%; height: 100%; object-fit: contain; }
.instituto-name{ font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 600; color: var(--sage-light); }

main{ max-width: 1250px; margin: 0 auto; padding: 30px 20px; }
.card{ background: var(--white); border: 1px solid rgba(223, 182, 178, 0.5); border-radius: var(--radius); padding: 35px; margin-bottom: 24px; box-shadow: var(--shadow); position: relative; }
.card::after{ content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--sage); border-radius: var(--radius) var(--radius) 0 0; }
.card-title{ font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--sage-dark); margin-bottom: 20px; }
.row{ display:flex; flex-wrap:wrap; gap:14px; margin-bottom:14px; }
.field{ display:flex; flex-direction:column; gap:5px; flex:1; min-width:150px; }
.field label{ font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted); letter-spacing: 0.5px; }
input,select{ background: transparent; border: none; border-bottom: 1px solid var(--border); padding: 11px 12px; color: var(--text); font-size: 14px; outline: none; transition: all 0.3s; }
input:focus,select:focus{ border-bottom: 2px solid var(--sage); }

.btn{ padding: 14px 24px; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 500; letter-spacing: 1.5px; cursor: pointer; text-transform: uppercase; transition: all .3s; box-shadow: 0 4px 12px rgba(82, 43, 91, 0.1); }
.btn-primary{ background: var(--sage-dark); color: #fff; }
.btn-primary:hover{ background: var(--sage-light); transform: translateY(-2px); }
.btn-secondary{ background: var(--sage); color: #fff; }
.btn-secondary:hover{ background: var(--sage-dark); transform: translateY(-2px); }
.btn-danger{ background: #FFF0F0; color: var(--fail); border: 1px solid var(--fail); box-shadow: none; }
.btn-danger:hover{ background: var(--fail); color: #fff; }
.btn-sm{ padding: 8px 16px; font-size: 11px; border-radius: 20px; }

.cursos-grid{ display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-top: 15px; }
.curso-chip{ background: var(--white); border: 1px solid rgba(223, 182, 178, 0.4); border-radius: var(--radius-sm); padding: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 700; transition: all 0.2s; }
.curso-chip.active-curso{ background: var(--canvas); color: var(--sage-light); border-color: var(--border); box-shadow: 0 8px 20px rgba(82, 43, 91, 0.1); }

.table-wrap{ overflow-x: auto; border: 1px solid rgba(223, 182, 178, 0.4); border-radius: var(--radius-sm); margin-top: 25px; box-shadow: var(--shadow); }
table{ width:100%; border-collapse:collapse; font-size:13px; min-width:1050px; background: #FFF; }
thead th{ background: linear-gradient(to bottom, #FFFFFF, var(--canvas)); color: var(--sage-dark); font-family: 'Playfair Display', serif; font-weight: 700; padding: 14px 8px; border-bottom: 2px solid var(--border); }
thead th input { background: #ffffff; border: 1px solid var(--border); border-radius: 6px; color: var(--sage-light); text-align: center; font-weight: 700; width: 90px; padding: 4px; }
tbody tr { border-bottom: 1px solid rgba(223, 182, 178, 0.2); transition: background 0.2s; }
tbody tr:hover { background-color: rgba(251, 228, 216, 0.2); }
tbody td{ padding: 12px 8px; text-align:center; vertical-align: middle; }
.grade-cell input{ width: 55px; padding: 6px 4px; text-align:center; border: 1px solid var(--border); border-radius: 6px; background: rgba(251, 228, 216, 0.2); outline: none; }
.grade-cell input:focus{ background: #ffffff; border-color: var(--sage); }
.final-cell{ font-weight: 800; font-size: 15px; background: rgba(251, 228, 216, 0.3); color: var(--sage-light); border-left: 1px solid rgba(223, 182, 178, 0.3); border-right: 1px solid rgba(223, 182, 178, 0.3); }
.hidden{ display:none !important; }
.sync-box { background: #ffffff; border: 1px solid rgba(223, 182, 178, 0.5); padding: 22px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px; flex-wrap: wrap; box-shadow: var(--shadow); border-left: 5px solid var(--sage-dark); }

/* RECUADRO CIRCULAR PARA LA FOTO EN LA TABLA DEL DOCENTE */
.student-avatar-frame { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--border); background: rgba(251, 228, 216, 0.3); display: inline-flex; align-items: center; justify-content: center; overflow: hidden; }
.student-avatar-frame img { width: 100%; height: 100%; object-fit: cover; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-colegio">
    <img src="logo.png" alt="Logo" onerror="this.onerror=null; this.src='WhatsApp Image 2026-02-18 at 5.01.18 PM.jpeg';">
  </div>
  <div class="instituto-name">🔒 PANEL DE LA DOCENTE — KARLA CASTRO</div>
  <div style="font-family: 'Cormorant Garamond', serif; font-size:18px; color:var(--sage); font-style:italic; font-weight: 600; letter-spacing: 1px; margin-top: 4px;">Control de Notas y Publicación Web Estudiantil</div>
</header>

<main>
  <div class="sync-box">
    <div>
      <h4 style="color:var(--sage-dark); font-family:'Playfair Display', serif; font-size: 18px;">🌐 Publicación Estudiantil Desglosada</h4>
      <p style="font-size:12px; color:var(--text-muted); margin-top: 2px;">Genera el archivo con Acumulados, Exámenes, Totales por parcial y Promedio Anual incorporados.</p>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-secondary" onclick="exportarParaAlumnos()" style="background:var(--sage-dark);">📦 Generar Base de Datos para Alumnos</button>
      <button class="btn" onclick="document.getElementById('import-file').click()" style="background:var(--sage); color:#fff; border:none;">📥 Importar Datos Anteriores</button>
      <input type="file" id="import-file" class="hidden" accept=".json" onchange="importarDatos(this)">
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏫 Configuración de Curso y Aula</div>
    <div class="row" style="align-items:flex-end;">
      <div class="field">
        <label>Año / Grado</label>
        <select id="inp-grado">
          <option value="">— Seleccionar —</option>
          <option>7° Año</option><option>8° Año</option><option>9° Año</option>
          <option>10° Año</option><option>11° Año</option>
        </select>
      </div>
      <div class="field" style="max-width:120px;">
        <label>Sección</label>
        <select id="inp-seccion"><option>1</option><option>2</option><option>3</option><option>4</option></select>
      </div>
      <div class="field">
        <label>Asignatura</label>
        <input type="text" id="inp-curso-custom" placeholder="Ej: Matemáticas">
      </div>
      <button class="btn btn-primary" onclick="agregarCurso()">Crear Curso</button>
    </div>
    <div id="cursos-grid" class="cursos-grid"></div>
  </div>

  <div id="panel-libro" class="hidden">
    <div class="card">
      <div class="card-title" id="lbl-curso-actual">—</div>
      
      <div class="row" style="gap:8px; margin-bottom:20px;">
        <button class="btn btn-sm" id="pbtn-I" onclick="setParcial('I')">I Parcial</button>
        <button class="btn btn-sm" id="pbtn-II" onclick="setParcial('II')">II Parcial</button>
        <button class="btn btn-sm" id="pbtn-III" onclick="setParcial('III')">III Parcial</button>
        <button class="btn btn-sm" id="pbtn-IV" onclick="setParcial('IV')">IV Parcial</button>
      </div>

      <div class="row" style="align-items:flex-end; background:rgba(251, 228, 216, 0.2); padding:16px; border-radius:14px; border:1px solid var(--border); gap: 12px;">
        <div class="field" style="max-width:180px;"><label>Identidad (13 dígitos)</label><input type="text" id="inp-alu-id" maxlength="13"></div>
        <div class="field"><label>Nombre del Alumno</label><input type="text" id="inp-alu-nombre" placeholder="Apellidos, Nombres"></div>
        <div class="field" style="max-width:100px;">
          <label>Género</label>
          <select id="inp-alu-genero"><option value="F">Niña</option><option value="M">Niño</option></select>
        </div>
        <button class="btn btn-primary" onclick="agregarAlumno()">Inscribir</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead id="thead-notes"></thead>
          <tbody id="tbody-notas"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
let DB = JSON.parse(localStorage.getItem('ips_esperanza_notas') || '{}');
let activeCurso = null; let activeParcial = 'I';

function save() { localStorage.setItem('ips_esperanza_notas', JSON.stringify(DB)); }

function agregarCurso(nombreForzado = null){
  if(nombreForzado) {
    const key = nombreForzado.replace(/\s+/g,'_');
    if(!DB[key]){
      DB[key] = { nombre: nombreForzado, alumnos: [], actividadesNombres: { I:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], II:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], III:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], IV:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"] }, parciales: { I:{notas:{}}, II:{notas:{}}, III:{notas:{}}, IV:{notas:{}} } };
    }
    return key;
  }
  const grado = document.getElementById('inp-grado').value;
  const seccion = document.getElementById('inp-seccion').value;
  const custom = document.getElementById('inp-curso-custom').value.trim();
  if(!grado || !custom) return;
  const key = (grado + '-' + seccion + '-' + custom).replace(/\s+/g,'_');
  if(!DB[key]){
    DB[key] = { nombre: `${grado} (Sec. ${seccion}) — ${custom}`, alumnos: [], actividadesNombres: { I:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], II:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], III:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"], IV:["Act. 1","Act. 2","Act. 3","Act. 4","Act. 5","Act. 6"] }, parciales: { I:{notas:{}}, II:{notas:{}}, III:{notas:{}}, IV:{notas:{}} } };
  }
  save(); renderCursosGrid(); document.getElementById('inp-curso-custom').value = '';
}

function renderCursosGrid(){
  const grid = document.getElementById('cursos-grid'); grid.innerHTML = '';
  Object.keys(DB).forEach(key => {
    const div = document.createElement('div'); div.className = 'curso-chip' + (key === activeCurso ? ' active-curso' : '');
    div.innerHTML = `<span>${DB[key].nombre}</span> <span style="font-size:11px; opacity:0.8;">${DB[key].alumnos.length} alu.</span>`;
    div.onclick = () => { activeCurso = key; document.getElementById('panel-libro').classList.remove('hidden'); document.getElementById('lbl-curso-actual').textContent = DB[key].nombre; setParcial(activeParcial); renderCursosGrid(); };
    grid.appendChild(div);
  });
}

function setParcial(p){ activeParcial = p; ['I','II','III','IV'].forEach(k => document.getElementById('pbtn-'+k).style.background = k===p?'var(--sage-dark)':'#FFF'); ['I','II','III','IV'].forEach(k => document.getElementById('pbtn-'+k).style.color = k===p?'#FFF':'var(--sage-dark)'); renderTabla(); }
function cambiarNombreActividad(idx, val){ if(!activeCurso) return; DB[activeCurso].actividadesNombres[activeParcial][idx] = val; save(); }

function agregarAlumno(){
  const id = document.getElementById('inp-alu-id').value.trim(); const nombre = document.getElementById('inp-alu-nombre').value.trim(); const genero = document.getElementById('inp-alu-genero').value;
  if(id.length !== 13 || !nombre) { alert('Identidad de 13 dígitos y nombre requeridos.'); return; }
  if(DB[activeCurso].alumnos.find(a=>a.id===id)) return;
  DB[activeCurso].alumnos.push({ id, nombre, genero }); save();
  document.getElementById('inp-alu-id').value = ''; document.getElementById('inp-alu-nombre').value = ''; renderTabla();
}

function renderTabla(){
  if(!activeCurso) return; const c = DB[activeCurso]; const p = c.parciales[activeParcial];
  let th = `<tr><th>N°</th><th>Foto</th><th style="text-align:left; padding-left: 10px;">Identidad & Alumno</th>`;
  for(let i=0;i<6;i++) th += `<th><input type="text" value="${c.actividadesNombres[activeParcial][i]}" onchange="cambiarNombreActividad(${i},this.value)"></th>`;
  th += `<th>Acum /50</th><th>Examen /50</th><th>Nota Parcial</th><th>Acción</th></tr>`;
  document.getElementById('thead-notes').innerHTML = th;

  const tbody = document.getElementById('tbody-notas'); tbody.innerHTML = '';
  c.alumnos.forEach((alu, idx) => {
    if(!p.notas[alu.id]) p.notas[alu.id] = { act: Array(6).fill(''), examen: '' };
    const n = p.notas[alu.id]; let acum = 0; n.act.forEach(v => acum += (parseFloat(v)||0));
    const total = Math.round(acum + (parseFloat(n.examen)||0));
    let tdActs = '';
    for(let i=0;i<6;i++) tdActs += `<td><div class="grade-cell"><input type="number" step="0.1" value="${n.act[i]}" onchange="actCelda('${alu.id}','act',${i},this.value,null)"></div></td>`;
    
    // Muestra la foto real del alumno si existe en su perfil, o una silueta por defecto
    let fotoHtml = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    if (alu.foto && alu.foto.trim() !== "") {
      fotoHtml = `<img src="${alu.foto}" alt="Foto">`;
    }

    let tr = document.createElement('tr');
    tr.innerHTML = `<td>${idx+1}</td><td><div class="student-avatar-frame">${fotoHtml}</div></td><td style="text-align:left; padding-left: 10px;"><b>${alu.nombre}</b><br><small style="color:var(--text-muted); font-weight:500;">${alu.id}</small></td>${tdActs}<td><b>${acum.toFixed(1)}</b></td><td><div class="grade-cell"><input type="number" value="${n.examen}" onchange="actCelda('${alu.id}','examen',null,this.value,50)"></div></td><td class="final-cell">${total}</td><td><button class="btn btn-danger btn-sm" onclick="eliminarAlu('${alu.id}')">✕</button></td>`;
    tbody.appendChild(tr);
  });
}

function actCelda(id, tipo, idx, val, max){
  let num = parseFloat(val); if(isNaN(num)||num<0) num=''; else if(max && num>max) num=max;
  if(tipo==='act') DB[activeCurso].parciales[activeParcial].notas[id].act[idx] = num;
  else DB[activeCurso].parciales[activeParcial].notas[id].examen = num;
  save(); renderTabla();
}

function eliminarAlu(id){ if(confirm('¿Desvincular alumno?')){ DB[activeCurso].alumnos = DB[activeCurso].alumnos.filter(a=>a.id!==id); save(); renderTabla(); } }

function exportarParaAlumnos() {
  let output = {};
  Object.keys(DB).forEach(cKey => {
    const curso = DB[cKey];
    curso.alumnos.forEach(alu => {
      if (!output[alu.id]) {
        output[alu.id] = { nombre: alu.nombre, genero: alu.genero, foto: alu.foto || '', asignaturas: {} };
      }
      
      const parcialI = obtenerResumen(curso, 'I', alu.id);
      const parcialII = obtenerResumen(curso, 'II', alu.id);
      const parcialIII = obtenerResumen(curso, 'III', alu.id);
      const parcialIV = obtenerResumen(curso, 'IV', alu.id);

      let sumaTotales = 0;
      let parcialesCursados = 0;

      [parcialI, parcialII, parcialIII, parcialIV].forEach(p => {
        if (p.cursado) {
          sumaTotales += p.total;
          parcialesCursados++;
        }
      });

      const promedioAnual = parcialesCursados > 0 ? Math.round(sumaTotales / parcialesCursados) : 0;

      output[alu.id].asignaturas[curso.nombre] = {
        I: parcialI,
        II: parcialII,
        III: parcialIII,
        IV: parcialIV,
        promedioAnual: parcialesCursados > 0 ? promedioAnual : '-'
      };
    });
  });

  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(output));
  const dlAnchorElem = document.createElement('a');
  dlAnchorElem.setAttribute("href", dataStr);
  dlAnchorElem.setAttribute("download", "notas_alumnos.json");
  dlAnchorElem.click();
}

function obtenerResumen(curso, pKey, aluId) {
  const pData = curso.parciales[pKey];
  const n = pData.notas[aluId] || { act: Array(6).fill(''), examen: '' };
  let acum = 0; n.act.forEach(v => acum += (parseFloat(v) || 0));
  let examen = parseFloat(n.examen) || 0;
  const cursado = n.act.some(v => v !== '') || n.examen !== '';
  
  const nombresDeEsteParcial = curso.actividadesNombres && curso.actividadesNombres[pKey] 
    ? curso.actividadesNombres[pKey] 
    : ["Act. 1", "Act. 2", "Act. 3", "Act. 4", "Act. 5", "Act. 6"];

  return { 
    act: n.act,
    nombresAct: nombresDeEsteParcial, 
    acum: parseFloat(acum.toFixed(1)), 
    examen: examen, 
    total: Math.round(acum + examen), 
    cursado: cursado 
  };
}

function importarDatos(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const datosCargados = JSON.parse(e.target.result);
      if (!datosCargados || Object.keys(datosCargados).length === 0) return;

      const primerasLlaves = Object.keys(datosCargados);
      const esArchivoAlumno = datosCargados[primerasLlaves[0]].asignaturas !== undefined;

      if (esArchivoAlumno) {
        DB = {}; 
        Object.keys(datosCargados).forEach(idAlu => {
          const aluData = datosCargados[idAlu];
          Object.keys(aluData.asignaturas).forEach(materiaNombre => {
            const cKey = agregarCurso(materiaNombre);
            if (!DB[cKey].alumnos.find(a => a.id === idAlu)) {
              DB[cKey].alumnos.push({ id: idAlu, nombre: aluData.nombre, genero: aluData.genero || 'F', foto: aluData.foto || '' });
            }
            ['I','II','III','IV'].forEach(pKey => {
              const parcialInfo = aluData.asignaturas[materiaNombre][pKey];
              if (parcialInfo && parcialInfo.cursado) {
                DB[cKey].parciales[pKey].notas[idAlu] = {
                  act: parcialInfo.act || [parcialInfo.acum, '', '', '', '', ''],
                  examen: parcialInfo.examen !== 0 || parcialInfo.acum !== 0 ? parcialInfo.examen : ''
                };
                if(parcialInfo.nombresAct) {
                  DB[cKey].actividadesNombres[pKey] = parcialInfo.nombresAct;
                }
              }
            });
          });
        });
        save(); renderCursosGrid();
        alert("¡Base de datos reconstruida con éxito!");
      } else {
        DB = datosCargados;
        save(); renderCursosGrid();
        alert("¡Registros sincronizados con éxito!");
      }
    } catch (err) { 
      alert("Error al procesar el archivo."); 
    }
  };
  reader.readAsText(file);
}

window.onload = function(){ renderCursosGrid(); };
</script>
</body>
</html>
