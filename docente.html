<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Docente - Karla Castro</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .card { max-width: 900px; margin: auto; background: #fff; padding: 35px; border-radius: 32px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: relative; }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: #854F6C; border-radius: 32px 32px 0 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        .foto-estudiante { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #DFB6B2; display: block; margin: auto; }
    </style>
</head>
<body>

<div class="card">
    <h2>Panel Docente — Karla Castro</h2>
    <div id="mensaje-error" style="color: red;"></div>
    <table>
        <thead>
            <tr>
                <th>Foto</th>
                <th>Nombre</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr>
                <td colspan="2">Cargando datos...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    try {
        // Datos de prueba para verificar que la estructura funciona
        let alumnos = [
            { nombre: "Ejemplo Alumno", foto: "" }
        ];

        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = '';

        alumnos.forEach(alu => {
            const fila = document.createElement('tr');
            // Usamos un icono por defecto si no hay foto
            const imgHtml = alu.foto ? `<img src="${alu.foto}" class="foto-estudiante">` : '<div style="width:45px; height:45px; border-radius:50%; background:#ccc; display:flex; align-items:center; justify-content:center;">👤</div>';
            
            fila.innerHTML = `
                <td>${imgHtml}</td>
                <td>${alu.nombre}</td>
            `;
            cuerpo.appendChild(fila);
        });
    } catch (e) {
        document.getElementById('mensaje-error').innerText = "Error detectado: " + e.message;
        console.error(e);
    }
</script>

</body>
</html>
