<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Polivalente San Pedro de Tutule — Panel Docente</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-dark: #49225B;
            --medium-purple: #6E3482;
            --accent-lilac: #A56ABD;
            --light-bg: #E7DBEF;
            --soft-white: #F5EBFA;
            --text-dark: #2A1137;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light-bg);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-dark);
            font-size: 2.5rem;
            margin: 0 0 5px 0;
        }

        header p {
            font-style: italic;
            color: var(--medium-purple);
            margin: 0;
            font-size: 1.1rem;
        }

        .card {
            background-color: var(--soft-white);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(73, 34, 91, 0.08);
            border: 1px solid rgba(165, 106, 189, 0.2);
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-dark);
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
        }

        .btn-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .btn-primary {
            background-color: var(--primary-dark);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--medium-purple);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary-dark);
            border: 2px solid var(--primary-dark);
        }

        .btn-secondary:hover {
            background-color: var(--primary-dark);
            color: white;
            transform: translateY(-2px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--medium-purple);
            letter-spacing: 0.5px;
        }

        select, input {
            font-family: 'Poppins', sans-serif;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--accent-lilac);
            background-color: white;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        select:focus, input:focus {
            outline: 2px solid var(--medium-purple);
        }

        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .student-chip {
            background-color: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid var(--accent-lilac);
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .student-name {
            font-weight: 500;
            color: var(--primary-dark);
        }

        .student-meta {
            font-size: 0.8rem;
            color: var(--medium-purple);
        }
    </style>
</head>
<body>

    <header>
        <h1>Instituto Polivalente San Pedro de Tutule</h1>
        <p>Panel de Control Docente — Profa. Karla Castro</p>
    </header>

    <div class="card">
        <h2>🌐 Sincronización en la Nube y Copias de Seguridad</h2>
        <div class="btn-container">
            <button class="btn-primary" onclick="publicarEnNube()">🚀 PUBLICAR NOTAS A LOS ALUMNOS</button>
            <button class="btn-secondary" onclick="respaldarLocal()">📥 RESPALDAR EN COMPUTADORA</button>
            <button class="btn-secondary" onclick="importarLocal()">📤 IMPORTAR RESPALDO LOCAL</button>
        </div>
    </div>

    <div class="card">
        <h2>📁 Configuración de Curso y Aula</h2>
        <div class="form-grid">
            <div class="form-group">
                <label>Año / Grado</label>
                <select id="selectGrado" onchange="filtrarAlumnosPorCurso()">
                    <option value="">— Seleccionar —</option>
                    <option value="7">Séptimo Grado</option>
                    <option value="8">Octavo Grado</option>
                    <option value="9">Noveno Grado</option>
                </select>
            </div>
            <div class="form-group">
                <label>Sección</label>
                <select id="selectSeccion" onchange="filtrarAlumnosPorCurso()">
                    <option value="1">1</option>
                    <option value="2">2</option>
                </select>
            </div>
            <div class="form-group">
                <label>Asignatura / Curso</label>
                <input type="text" id="asignaturaInput" placeholder="Ej: Matemáticas">
            </div>
            <button class="btn-primary" onclick="crearCurso()" style="height: 48px;">CREAR CURSO</button>
        </div>

        <div id="alumnosContainer" class="student-grid">
            </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Configuración oficial corregida sin rutas secundarias
        const firebaseConfig = {
            databaseURL: "https://portal-ips-san-pedro-default-rtdb.firebaseio.com"
        };
        
        // Inicialización segura
        firebase.initializeApp(firebaseConfig);
        const DB = firebase.database();

        // Estructura de datos global
        let datosSistema = {
            cursos: {},
            alumnos: []
        };

        // Función para filtrar y ordenar correctamente por curso asignado
        function filtrarAlumnosPorCurso() {
            const grado = document.getElementById('selectGrado').value;
            const seccion = document.getElementById('selectSeccion').value;
            const container = document.getElementById('alumnosContainer');
            container.innerHTML = '';

            if (!grado) return;

            // Filtrar alumnos que pertenezcan estrictamente a este curso y sección
            const filtrados = datosSistema.alumnos.filter(a => a.grado == grado && a.seccion == seccion);

            if(filtrados.length === 0) {
                container.innerHTML = `<p style="color: var(--medium-purple); font-style: italic;">No hay alumnos registrados con notas en esta sección todavía.</p>`;
                return;
            }

            filtrados.forEach(alumno => {
                const chip = document.createElement('div');
                chip.className = 'student-chip';
                chip.innerHTML = `
                    <span class="student-name">📋 ${alumno.nombre}</span>
                    <span class="student-meta">Nota Parcial: ${alumno.nota || 'Pendiente'}</span>
                `;
                container.appendChild(chip);
            });
        }

        function publicarEnNube() {
            if (!DB) {
                alert("Error: La base de datos no se ha inicializado correctamente.");
                return;
            }
            // Lógica para subir los datos estructurados a la nube
            DB.ref('notas_sistema').set(datosSistema)
                .then(() => alert("¡Calificaciones subidas a la nube con éxito! Tus alumnos ya pueden revisarlas."))
                .catch(err => alert("Error al subir: " + err.message));
        }

        function respaldarLocal() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(datosSistema));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "notas_alumnos.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        // Simulación de carga inicial para demostración (Sustituir con tu carga de archivo local)
        window.onload = function() {
            // Ejemplo de datos recuperados para 7mo Grado que ya tenían notas asignadas
            datosSistema.alumnos = [
                { nombre: "JUNIOR FRANCISCO HERNANDEZ VENTURA", grado: "7", seccion: "1", nota: "85%" },
                { nombre: "SAID JOSUE MALDONADO LOPEZ", grado: "7", seccion: "1", nota: "90%" },
                { nombre: "ANA KARINA PINEDA REYES", grado: "8", seccion: "1", nota: "0%" }
            ];
            filtrarAlumnosPorCurso();
        };
    </script>
</body>
</html>
