<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Avanzado Docente · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --c-cream-bg: #FBE4D8;   
    --c-nude-soft: #DFB6B2;  
    --c-berry-accent: #854F6C; 
    --c-plum-text: #522B5B;    
    --c-fine-dark: #2B124C;    
    --shadow-floating: 0 30px 60px rgba(82, 43, 91, 0.12), 0 12px 25px rgba(0, 0, 0, 0.03);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--c-cream-bg) 50%, var(--c-nude-soft) 100%);
    background-attachment: fixed;
    color: var(--c-fine-dark);
    min-height: 100vh;
    padding: 50px 20px;
  }

  header { text-align: center; margin-bottom: 40px; }
  .inst-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 600; color: var(--c-fine-dark); }
  .docente-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; font-weight: 600; color: var(--c-berry-accent); margin-top: 8px; letter-spacing: 2px; }

  .dashboard-container {
    max-width: 1150px; width: 100%; margin: 0 auto; background: #FFFFFF; border: 1px solid rgba(223, 182, 178, 0.5);
    border-radius: 32px; padding: 45px; box-shadow: 0 40px 80px rgba(82, 43, 91, 0.06);
  }

  .top-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--c-cream-bg); padding-bottom: 25px; margin-bottom: 40px; }
  .panel-title h2 { font-family: 'Playfair Display', serif; font-size: 30px; color: var(--c-plum-text); }
  .panel-title p { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--c-berry-accent); margin-top: 4px; }

  .institution-logo { width: 95px; height: 95px; object-fit: contain; border-radius: 50%; border: 2px solid var(--c-nude-soft); background: #FFFFFF; padding: 3px; }

  .students-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; margin-bottom: 50px; }
  
  .student-card {
    background: #FFFFFF; border: 1px solid rgba(223, 182, 178, 0.3); border-radius: 22px; padding: 22px;
    display: flex; align-items: center; gap: 20px; cursor: pointer; box-shadow: var(--shadow-floating); transition: all 0.4s;
  }
  .student-card:hover, .student-card.active { transform: translateY(-5px); border-color: var(--c-berry-accent); }

  .student-photo-frame { width: 75px; height: 75px; border-radius: 50%; border: 2px solid var(--c-nude-soft); background: var(--c-cream-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
  .student-photo-frame img { width: 100%; height: 100%; object-fit: cover; }

  .student-details { flex-grow: 1; overflow: hidden; }
  .student-name { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--c-fine-dark); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .student-id { font-size: 12px; color: var(--c-berry-accent); margin-top: 3px; }
  .status-badge { display: inline-block; font-size: 10px; font-weight: 600; background: var(--c-cream-bg); color: var(--c-plum-text); padding: 3px 10px; border-radius: 10px; margin-top: 8px; text-transform: uppercase; }

  .details-inspection-zone { border-top: 2px dashed var(--c-nude-soft); padding-top: 40px; margin-top: 20px; }
  .inspection-header { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--c-plum-text); margin-bottom: 30px; }
  
  .materia-title {
    font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; margin-top: 40px; margin-bottom: 25px;
    display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--c-cream-bg); padding-bottom: 12px; color: var(--c-plum-text);
  }
  .promedio-badge { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; background: var(--c-cream-bg); color: var(--c-fine-dark); padding: 6px 16px; border-radius: 30px; }

  .parcial-block { border: 1px solid rgba(223, 182, 178, 0.3); border-radius: 20px; padding: 25px; margin-bottom: 30px; background: #FFFFFF; box-shadow: var(--shadow-floating); }
  .parcial-header { font-family: 'Playfair Display', serif; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 18px; color: var(--c-fine-dark); border-bottom: 1px solid var(--c-cream-bg); padding-bottom: 10px; }
  
  .grid-activities { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .act-box { background: rgba(251, 228, 216, 0.3); border-radius: 12px; padding: 14px 6px; text-align: center; }
  .act-title { font-size: 10px; font-weight: 600; color: var(--c-berry-accent); text-transform: uppercase; }
  .act-score { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 600; margin-top: 6px; }

  .score-summary-inline { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; margin-top: 20px; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--c-nude-soft); }
  .hidden { display: none !important; }

  .music-player { position: fixed; bottom: 35px; right: 35px; background: #ffffff; border: 1px solid var(--c-nude-soft); border-radius: 30px; padding: 12px 24px; display: flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(82, 43, 91, 0.06); z-index: 100; cursor: pointer; color: var(--c-fine-dark); transition: all 0.3s; }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="dashboard-container">
  <div class="top-bar">
    <div class="panel-title">
      <h2>Panel de Control Docente</h2>
      <p>Supervisión activa de calificaciones e historial fotográfico de matrícula</p>
    </div>
    <img src="logo.png" alt="Logo" class="institution-logo" onerror="this.onerror=null; this.src='WhatsApp Image 2026-02-18 at 5.01.18 PM.jpeg';">
  </div>

  <div class="students-grid" id="students-list-container"></div>

  <div id="inspection-zone" class="details-inspection-zone hidden">
    <div class="inspection-header">📋 Expediente en Inspección: <strong id="inspect-student-name" style="color: var(--c-plum-text);"></strong></div>
    <div id="inspect-materias-container"></div>
  </div>
</div>

<div class="music-player" onclick="toggleMusic()">
  <span>🎹</span> <span id="music-text">Piano Acústico: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;

function cargarPanelDocente() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(res => res.json()).then(data => { NOTAS_ALUMNOS = data; renderizarEstudiantes(); })
    .catch(() => { document.getElementById('students-list-container').innerHTML = `<p style="color: #A34343; padding: 20px;">Error al enlazar con 'notas_alumnos.json'. Asegúrate de subir ambos archivos juntos.</p>`; });
}

function renderizarEstudiantes() {
  const container = document.getElementById('students-list-container'); container.innerHTML = '';
  Object.keys(NOTAS_ALUMNOS).forEach(id => {
    const alumno = NOTAS_ALUMNOS[id]; const card = document.createElement('div');
    card.className = 'student-card'; card.onclick = () => verDetalleAlumno(id, card);

    let fotoHtml = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2B124C" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    if (alumno.foto) { fotoHtml = `<img src="${alumno.foto}">`; }

    card.innerHTML = `<div class="student-photo-frame">${fotoHtml}</div><div class="student-details"><div class="student-name">${alumno.nombre}</div><div class="student-id">ID: ${id}</div><span class="status-badge">Verificado</span></div>`;
    container.appendChild(card);
  });
}

function verDetalleAlumno(id, cardElement) {
  document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active')); cardElement.classList.add('active');
  const alumno = NOTAS_ALUMNOS[id]; document.getElementById('inspect-student-name').textContent = alumno.nombre;
  
  const container = document.getElementById('inspect-materias-container'); container.innerHTML = '';
  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia]; const div = document.createElement('div');
    div.innerHTML = `<div class="materia-title"><span>${materia.replace(/_/g, ' ').toUpperCase()}</span><span class="promedio-badge">Promedio Anual: ${notas.promedioAnual}%</span></div><div class="p-list"></div>`;
    
    const pList = div.querySelector('.p-list');
    ['I', 'II', 'III', 'IV'].forEach(p => {
      const pData = notas[p];
      let nAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct) nAct = pData.nombresAct;

      const block = document.createElement('div'); block.className = 'parcial-block';
      if (!(pData && pData.cursado)) block.style.opacity = "0.4";

      let grid = ''; let lActs = pData && pData.act ? pData.act : Array(6).fill('');
      for(let i=0; i<6; i++) { grid += `<div class="act-box"><div class="act-title">${nAct[i]}</div><div class="act-score">${lActs[i] !== '' ? lActs[i] : '-'}</div></div>`; }

      block.innerHTML = `
        <div class="parcial-header"><span>Parcial ${p}</span><span style="font-size:13px; color: var(--c-berry-accent);">Total: ${pData && pData.cursado ? pData.total+'%' : '-'}</span></div>
        <div class="grid-activities">${grid}</div>
        <div class="score-summary-inline"><span>Acumulado (50%): ${pData && pData.cursado ? pData.acum : '-'}</span><span>Examen (50%): ${pData && pData.cursado ? pData.examen : '-'}</span></div>
      `;
      pList.appendChild(block);
    });
    container.appendChild(div);
  });
  document.getElementById('inspection-zone').classList.remove('hidden');
  document.getElementById('inspection-zone').scrollIntoView({ behavior: 'smooth' });
}

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) { audio.play().catch(()=>{}); document.getElementById('music-text').innerText = "Piano Acústico: On"; musicPlaying = true; }
  else { audio.pause(); document.getElementById('music-text').innerText = "Piano Acústico: Off"; musicPlaying = false; }
}
window.onload = cargarPanelDocente;
</script>
</body>
</html>
