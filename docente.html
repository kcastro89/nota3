<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Docente - Karla Castro</title>
<style>
    body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { color: #2E7D52; text-align: center; font-size: 24px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
    /* Estilo para el recuadro circular de la foto */
    .foto-estudiante { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #2E7D52; }
</style>
</head>
<body>

<div class="container">
    <h1>Panel de Control — Profa. Karla Castro</h1>
    <table id="tabla-notas">
        <thead>
            <tr>
                <th>Foto</th>
                <th>Nombre del Alumno</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <!-- Los alumnos se cargan aquí -->
        </tbody>
    </table>
</div>

<script>
    // Ejemplo de cómo se cargarían los datos con foto
    let alumnos = [
        { nombre: "José Luis", foto: "url_de_la_foto_aqui.jpg" } 
    ];

    function cargarTabla() {
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = '';
        
        alumnos.forEach(alu => {
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td><img src="${alu.foto}" class="foto-estudiante" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png'"></td>
                <td>${alu.nombre}</td>
                <td><button>Editar</button></td>
            `;
            cuerpo.appendChild(fila);
        });
    }

    window.onload = cargarTabla;
</script>

</body>
</html>
