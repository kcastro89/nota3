<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de Control Docente · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paleta moderna basada en tonos verdes y azules */
    --bg-gradient-start: #f4f7f6;
    --bg-gradient-end: #e9f0f2;
    --color-primary: #1e3d59;     /* Azul profundo */
    --color-secondary: #17b978;   /* Verde esmeralda */
    --color-accent: #438a5e;      /* Verde oliva moderno */
    --color-text-dark: #112233;   /* Azul casi negro */
    --color-card-bg: #ffffff;
    --shadow-smooth: 0 10px 30px rgba(30, 61, 89, 0.05), 0 1px 3px rgba(30, 61, 89, 0.02);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
    background-attachment: fixed;
    color: var(--color-text-dark);
    min-height: 100vh;
    padding: 40px 20px;
  }

  header { text-align: center; margin-bottom: 35px; }
  .inst-title { font-size: 28px; font-weight: 700; color: var(--color-primary); letter-spacing: -0.5px; }
  .docente-name { font-size: 16px; font-weight: 500; color: var(--color-accent); margin-top: 6px; text-transform: uppercase; letter-spacing: 1.5px; }

  .dashboard-container {
    max-width: 1100px;
    width: 100%;
    margin: 0 auto;
    background: var(--color-card-bg);
    border: 1px solid rgba(30, 61, 89, 0.08);
    border-radius: 20px;
    padding: 35px;
    box-shadow: var(--shadow-smooth);
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--bg-gradient-end);
    padding-bottom: 20px;
    margin-bottom: 30px;
  }

  .panel-title h2 { font-size: 24px; font-weight: 700; color: var(--color-primary); }
  .panel-title p { font-size: 14px; color: var(--color-accent); font-weight: 400; margin-top: 2px; }

  /* SELECTORES DE SECCIONES */
  select, .selector-secciones {
    padding: 10px 18px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--color-primary);
    background-color: #ffffff;
    border: 1px solid rgba(30, 61, 89, 0.15);
    border-radius: 10px;
    outline: none;
    cursor: pointer;
    transition: all 0.3s;
  }
  select:focus {
    border-color: var(--color-secondary);
    box-shadow: 0 0 0 3px rgba(23, 185, 120, 0.1);
  }

  /* LISTADO GENERAL EN MATRIZ DE RECUADROS */
  .students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 35px;
  }

  .student-card {
    background: #FFFFFF;
    border: 1px solid rgba(30, 61, 89, 0.08);
    border-radius: 14px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(30, 61, 89, 0.02);
    transition: all 0.25s ease;
  }

  .student-card:hover, .student-card.active {
    transform: translateY(-3px);
    border-color: var(--color-secondary);
    box-shadow: 0 12px 20px rgba(30, 61, 89, 0.06);
  }

  /* CONTENEDOR REDONDO DE LA FOTO */
  .student-photo-frame {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    border: 2px solid var(--bg-gradient-end);
    background: var(--bg-gradient-start);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }

  .student-photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .student-details { flex-grow: 1; overflow: hidden; }
  .student-name { font-size: 15px; font-weight: 600; color: var(--color-primary); white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .student-id { font-size: 12px; color: var(--color-accent); margin-top: 2px; font-weight: 500; }
  .status-badge { display: inline-block; font-size: 10px; font-weight: 600; background: rgba(23, 185, 120, 0.1); color: var(--color-accent); padding: 2px 8px; border-radius: 6px; margin-top: 6px; }

  /* ÁREA DE INSPECCIÓN */
  .details-inspection-zone { border-top: 2px dashed var(--bg-gradient-end); padding-top: 30px; margin-top: 20px; }
  .inspection-header { font-size: 20px; font-weight: 700; color: var(--color-primary); margin-bottom: 25px; }
  
  .materia-title {
    font-size: 16px; font-weight: 700; margin-top: 30px; margin-bottom: 18px;
    display: flex; justify-content: space-between; border-bottom: 2px solid var(--bg-gradient-end); padding-bottom: 8px; color: var(--color-primary);
  }
  
  .promedio-badge { font-size: 12px; font-weight: 600; background: var(--color-primary); color: #ffffff; padding: 4px 12px; border-radius: 20px; }

  .parcial-block { border: 1px solid rgba(30, 61, 89, 0.06); border-radius: 12px; padding: 18px; margin-bottom: 20px; background: #FFFFFF; box-shadow: 0 4px 12px rgba(30, 61, 89, 0.01); }
  .parcial-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 14px; color: var(--color-primary); }
  
  .grid-activities { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
  .act-box { background: var(--bg-gradient-start); border-radius: 8px; padding: 10px 4px; text-align: center; }
  .act-title { font-size: 10px; font-weight: 600; color: var(--color-accent); text-transform: uppercase; }
  .act-score { font-size: 15px; font-weight: 600; margin-top: 4px; }

  .score-summary-inline { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; margin-top: 15px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--bg-gradient-end); background: var(--bg-gradient-start); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="dashboard-container">
  <div class="top-bar">
    <div class="panel-title">
      <h2>Panel de Control Docente</h2>
      <p>Administración del registro fotográfico y actas de calificaciones de alumnos</p>
    </div>
    
    <!-- Aquí se mantiene intacto tu contenedor o selector de sección original -->
    <div id="contenedor-selector">
      <!-- Tu lógica JS buscará el select o contenedor tal como lo tenías antes -->
      <select id="selector-seccion-original">
        <option value="TODOS">Todas las secciones</option>
      </select>
    </div>
  </div>

  <!-- MATRIZ DE RECUADROS PARA LOS ESTUDIANTES -->
  <div class="students-grid" id="students-list-container"></div>

  <!-- DESPLEGABLE INTERACTIVO DE NOTAS -->
  <div id="inspection-zone" class="details-inspection-zone hidden">
    <div class="inspection-header">📋 Expediente en Inspección: <strong id="inspect-student-name"></strong></div>
    <div id="inspect-materias-container"></div>
  </div>
</div>

<script>
// Mantén tus funciones de JavaScript originales idénticas.
// Lo único que agregamos es que al renderizar el elemento card, dibuje la foto.

let NOTAS_ALUMNOS = null;

function cargarPanelDocente() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(res => res.json()).then(data => { NOTAS_ALUMNOS = data; renderizarEstudiantes(); })
    .catch(() => { console.log("Error al cargar la base de datos."); });
}

function renderizarEstudiantes() {
  const container = document.getElementById('students-list-container');
  container.innerHTML = '';

  Object.keys(NOTAS_ALUMNOS).forEach(id => {
    const alumno = NOTAS_ALUMNOS[id];
    const card = document.createElement('div');
    card.className = 'student-card';
    card.onclick = () => verDetalleAlumno(id, card);

    // Lógica para pintar la foto si existe en el JSON o una silueta limpia si está vacía
    let fotoHtml = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1e3d59" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;
    if (alumno.foto && alumno.foto.trim() !== "") {
      fotoHtml = `<img src="${alumno.foto}" alt="Foto">`;
    }

    card.innerHTML = `
      <div class="student-photo-frame">${fotoHtml}</div>
      <div class="student-details">
        <div class="student-name">${alumno.nombre}</div>
        <div class="student-id">Identidad: ${id}</div>
        <span class="status-badge">Expediente Activo</span>
      </div>
    `;
    container.appendChild(card);
  });
}

function verDetalleAlumno(id, cardElement) {
  document.querySelectorAll('.student-card').forEach(c => c.classList.remove('active'));
  cardElement.classList.add('active');

  const alumno = NOTAS_ALUMNOS[id];
  document.getElementById('inspect-student-name').textContent = alumno.nombre;
  
  const container = document.getElementById('inspect-materias-container');
  container.innerHTML = '';

  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia];
    const div = document.createElement('div');
    
    div.innerHTML = `
      <div class="materia-title">
        <span>${materia.replace(/_/g, ' ').toUpperCase()}</span>
        <span class="promedio-badge">Anual: ${notas.promedioAnual}%</span>
      </div>
      <div class="p-list"></div>
    `;
    
    const pList = div.querySelector('.p-list');
    ['I', 'II', 'III', 'IV'].forEach(p => {
      const pData = notas[p];
      let nAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct) nAct = pData.nombresAct;

      const block = document.createElement('div');
      block.className = 'parcial-block';
      if (!(pData && pData.cursado)) block.style.opacity = "0.4";

      let grid = '';
      let lActs = pData && pData.act ? pData.act : Array(6).fill('');

      for(let i=0; i<6; i++) {
        grid += `
          <div class="act-box">
            <div class="act-title">${nAct[i]}</div>
            <div class="act-score">${lActs[i] !== '' ? lActs[i] : '-'}</div>
          </div>
        `;
      }

      block.innerHTML = `
        <div class="parcial-header">
          <span>Parcial ${p}</span>
          <span style="color: var(--color-accent); font-weight: 600;">Nota: ${pData && pData.cursado ? pData.total + '%' : '-'}</span>
        </div>
        <div class="grid-activities">${grid}</div>
        <div class="score-summary-inline">
          <span>Acumulado: ${pData && pData.cursado ? pData.acum : '-'}</span>
          <span>Examen: ${pData && pData.cursado ? pData.examen : '-'}</span>
        </div>
      `;
      pList.appendChild(block);
    });
    container.appendChild(div);
  });

  document.getElementById('inspection-zone').classList.remove('hidden');
  document.getElementById('inspection-zone').scrollIntoView({ behavior: 'smooth' });
}

window.onload = cargarPanelDocente;
</script>
</body>
</html>
