<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Calificaciones Oficial · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paleta de Lujo Silencioso y Exclusividad (Rebajando el morado) */
    --c-space-dark: #120A16; /* Uva ultra oscuro casi negro */
    --c-deep-wine: #26172B;  /* Vino/Uva profundo de fondo */
    --c-velvet: #422D47;     /* Toque sutil de terciopelo atenuado */
    --c-gold-satin: #C5A880; /* Dorado champán/satinado elegante */
    --c-silk-cream: #FDFBF7; /* Crema de seda de alta costura */
    --c-soft-gray: #F4EFF6;  /* Gris claro suavizado con matiz uva */
    
    --text-dark: #120A16;
    --text-muted: #5A4E5E;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Inter', sans-serif;
    /* Degradado liso de alta gama, sutil y opulento */
    background: linear-gradient(135deg, var(--c-deep-wine) 0%, var(--c-space-dark) 100%);
    background-attachment: fixed;
    color: var(--text-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 60px 20px;
    position: relative;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  header {
    text-align: center;
    margin-bottom: 60px;
    z-index: 10;
  }

  /* Nombre de la Institución: Sofisticado, elegante y de élite */
  .inst-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--c-silk-cream);
    line-height: 1.3;
    max-width: 800px;
    margin: 0 auto;
  }

  .docente-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-style: italic;
    font-weight: 400;
    color: var(--c-gold-satin);
    margin-top: 12px;
    letter-spacing: 3px;
  }

  /* PANEL PRINCIPAL: Minimalismo exclusivo de alta costura */
  .container-card {
    background: var(--c-silk-cream);
    border: 1px solid rgba(197, 168, 128, 0.3);
    border-radius: 32px; 
    max-width: 560px;
    width: 100%;
    margin: 0 auto 60px auto;
    padding: 60px 45px;
    position: relative;
    z-index: 5;
    box-shadow: 
      0 40px 90px rgba(18, 10, 22, 0.6),
      inset 0 1px 1px rgba(255, 255, 255, 0.9);
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 400;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: -0.5px;
    color: var(--text-dark);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 50px;
    line-height: 1.5;
  }

  .search-box {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }

  input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 1px solid rgba(18, 10, 22, 0.2);
    background: transparent;
    padding: 15px 0;
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    color: var(--text-dark);
    outline: none;
    font-weight: 300;
    text-align: center;
    letter-spacing: 6px;
    transition: border-color 0.3s;
  }

  input[type="text"]:focus {
    border-bottom: 1px solid var(--c-gold-satin);
  }

  /* Botón de Estilo Atelier Exclusivo */
  .btn-submit {
    display: block;
    width: 100%;
    background: var(--c-space-dark);
    color: var(--c-silk-cream);
    border: 1px solid var(--c-gold-satin);
    padding: 20px;
    border-radius: 12px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 13px;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    text-align: center;
    text-transform: uppercase;
  }

  .btn-submit:hover {
    background: var(--c-deep-wine);
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(18, 10, 22, 0.25);
  }

  .btn-submit:active {
    transform: translateY(0);
  }

  .btn-logout {
    background: transparent;
    color: var(--text-dark);
    font-size: 11px;
    padding: 12px;
    margin-top: 50px;
    border: 1px solid rgba(18, 10, 22, 0.15);
    border-radius: 8px;
  }
  
  .btn-logout:hover {
    background: rgba(18, 10, 22, 0.02);
    box-shadow: none;
    transform: none;
  }

  .profile-area {
    display: flex;
    align-items: center;
    gap: 25px;
    background: #FFFFFF;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid rgba(18, 10, 22, 0.06);
    margin-bottom: 45px;
    box-shadow: 0 10px 30px rgba(18, 10, 22, 0.02);
  }

  .profile-circle {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 1px solid var(--c-gold-satin);
    background: var(--c-soft-gray);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .profile-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .file-input-label {
    font-size: 11px;
    background: var(--c-space-dark);
    color: var(--c-silk-cream);
    padding: 10px 22px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1px solid var(--c-gold-satin);
    transition: background 0.2s;
  }

  .file-input-label:hover {
    background: var(--c-velvet);
  }

  .materia-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 400;
    margin-top: 60px;
    margin-bottom: 35px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(18, 10, 22, 0.1);
    padding-bottom: 15px;
    letter-spacing: -0.2px;
  }

  .promedio-badge {
    font-family: 'Inter', sans-serif; 
    font-size: 12px; 
    font-weight: 600; 
    background: var(--c-soft-gray); 
    color: var(--text-dark);
    padding: 8px 18px; 
    border-radius: 30px;
    border: 1px solid rgba(18, 10, 22, 0.05);
    letter-spacing: 0.5px;
  }

  /* BLOQUES PARCIALES EFECTO FLOTANTE INGRÁVIDO */
  .parcial-block {
    border: 1px solid rgba(18, 10, 22, 0.04);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 40px;
    background: #FFFFFF;
    position: relative;
    /* Efecto de flotación premium mediante sombras suaves multicapa */
    box-shadow: 
      0 15px 35px rgba(27, 22, 30, 0.06),
      0 5px 15px rgba(0, 0, 0, 0.02);
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .parcial-block:hover {
    /* Al pasar el cursor incrementa su altura de flotación de forma sofisticada */
    transform: translateY(-8px);
    box-shadow: 
      0 30px 60px rgba(27, 22, 30, 0.12),
      0 10px 20px rgba(0, 0, 0, 0.03);
  }

  .parcial-header {
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 400;
    font-size: 19px;
    color: var(--text-dark);
    border-bottom: 1px solid rgba(18, 10, 22, 0.06);
    padding-bottom: 12px;
  }

  .grid-activities {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-top: 25px;
  }

  .act-box {
    background: var(--c-soft-gray);
    border-radius: 12px;
    padding: 16px 6px;
    text-align: center;
    border: 1px solid rgba(18, 10, 22, 0.02);
  }

  .act-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .act-score {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    margin-top: 8px;
    color: var(--text-dark);
  }

  .score-summary-inline {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 500;
    margin-top: 25px;
    background: #FFFFFF;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid rgba(197, 168, 128, 0.35);
    color: var(--text-dark);
    letter-spacing: 0.3px;
  }

  .error-msg {
    color: #A34343;
    font-size: 13px;
    margin-top: 15px;
    text-align: center;
    font-weight: 500;
    display: none;
  }

  .hidden { display: none !important; }

  /* REPRODUCTOR DE AMBIENTE SINFÓNICO RELAJANTE */
  .music-player {
    position: fixed;
    bottom: 35px;
    right: 35px;
    background: #ffffff;
    border: 1px solid var(--c-gold-satin);
    border-radius: 30px;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    box-shadow: 0 10px 30px rgba(18, 10, 22, 0.1);
    z-index: 100;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  .music-player:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 35px rgba(18, 10, 22, 0.15);
  }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="container-card">

  <!-- ================= PANTALLA 1: LOG IN ================= -->
  <section id="panel-busqueda">
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingrese las credenciales del estudiante para acceder al registro privado y exclusivo.</p>

    <div class="search-box">
      <input type="text" id="txt-identidad" placeholder="0801199012345" maxlength="13">
      <button class="btn-submit" onclick="buscarCalificaciones()">Acceder al Portal</button>
      <div id="error-box" class="error-msg"></div>
    </div>
  </section>

  <!-- ================= PANTALLA 2: BOLETA ALUMNO ================= -->
  <section id="panel-boleta" class="hidden">
    <h2 id="lbl-nombre" style="text-align: left; font-size: 28px;">Estudiante</h2>
    <p class="subtitle" id="lbl-identidad" style="text-align: left; margin-bottom: 30px;">ID: 0000000000000</p>

    <div class="profile-area">
      <div class="profile-circle" id="avatar-preview">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#120A16" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <span style="display:block; font-size:12px; font-weight:500; margin-bottom:6px; color: var(--text-dark); letter-spacing: 0.5px;">Fotografía de Registro</span>
        <label class="file-input-label">
          Actualizar Retrato
          <input type="file" id="photo-upload" accept="image/*" style="display: none;" onchange="previewImage(event)">
        </label>
      </div>
    </div>

    <div id="materias-container"></div>

    <button class="btn-submit btn-logout" onclick="salirSistema()">Finalizar Consulta Privada</button>
  </section>
</div>

<!-- REPRODUCTOR SUAVE ORQUESTAL (PIANO / CUERDAS REFINADO) -->
<div class="music-player" onclick="toggleMusic()">
  <span id="music-icon">🎻</span>
  <span id="music-text">Fondo Sinfónico: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;

function cargarBaseDatos() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(response => { if (!response.ok) throw new Error(); return response.json(); })
    .then(data => { NOTAS_ALUMNOS = data; })
    .catch(err => { console.error("Error al enlazar la base de datos de élite."); });
}

function buscarCalificaciones() {
  const idBusqueda = document.getElementById('txt-identidad').value.trim();
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (idBusqueda.length !== 13) {
    errorBox.textContent = "El número de identidad debe contener exactamente 13 dígitos del registro oficial.";
    errorBox.style.display = 'block';
    return;
  }

  if (!NOTAS_ALUMNOS) {
    errorBox.textContent = "Error de enlace seguro con el servidor central.";
    errorBox.style.display = 'block';
    return;
  }

  const alumno = NOTAS_ALUMNOS[idBusqueda];
  if (!alumno) {
    errorBox.textContent = "No se localizó ningún expediente exclusivo asignado a este número de identidad.";
    errorBox.style.display = 'block';
    return;
  }

  document.getElementById('lbl-nombre').textContent = alumno.nombre;
  document.getElementById('lbl-identidad').textContent = "Expediente Oficial ID: " + idBusqueda;

  const container = document.getElementById('materias-container');
  container.innerHTML = '';

  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia];
    const divMateria = document.createElement('div');
    
    divMateria.innerHTML = `
      <div class="materia-title">
        <span>${materia.replace(/_/g, ' ').toUpperCase()}</span>
        <span class="promedio-badge">Rendimiento Anual: ${notas.promedioAnual}%</span>
      </div>
      <div class="parciales-list"></div>
    `;
    
    const parcialesList = divMateria.querySelector('.parciales-list');
    const parciales = ['I', 'II', 'III', 'IV'];

    parciales.forEach(p => {
      const pData = notas[p];
      let nombresAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct && pData.nombresAct.length === 6) {
        nombresAct = pData.nombresAct;
      }

      const blockParcial = document.createElement('div');
      blockParcial.className = 'parcial-block';
      
      if (!(pData && pData.cursado)) {
        blockParcial.style.opacity = "0.35";
      }

      let gridHtml = '';
      let listaActs = pData && pData.act ? pData.act : Array(6).fill('');

      for(let i=0; i<6; i++) {
        gridHtml += `
          <div class="act-box">
            <div class="act-title">${nombresAct[i]}</div>
            <div class="act-score">${listaActs[i] !== '' ? listaActs[i] : '-'}</div>
          </div>
        `;
      }

      blockParcial.innerHTML = `
        <div class="parcial-header">
          <span>Periodo ${p}</span>
          <span style="font-family:'Inter',sans-serif; font-weight:600; font-size:13px; color: var(--c-gold-satin);">Evaluación: ${pData && pData.cursado ? pData.total + '%' : '-'}</span>
        </div>
        <div class="grid-activities">${gridHtml}</div>
        <div class="score-summary-inline">
          <span>Bloque Acumulativo: ${pData && pData.cursado ? pData.acum.toFixed(1) : '-'} / 50</span>
          <span>Examen de Periodo: ${pData && pData.cursado ? pData.examen : '-'} / 50</span>
        </div>
      `;
      parcialesList.appendChild(blockParcial);
    });

    container.appendChild(divMateria);
  });

  document.getElementById('panel-busqueda').classList.add('hidden');
  document.getElementById('panel-boleta').classList.remove('hidden');
}

function salirSistema() {
  document.getElementById('txt-identidad').value = '';
  document.getElementById('panel-boleta').classList.add('hidden');
  document.getElementById('panel-busqueda').classList.remove('hidden');
}

function previewImage(event) {
  const reader = new FileReader();
  reader.onload = function() {
    document.getElementById('avatar-preview').innerHTML = `<img src="${reader.result}">`;
  }
  reader.readAsDataURL(event.target.files[0]);
}

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) {
    audio.play().catch(() => {});
    document.getElementById('music-text').innerText = "Fondo Sinfónico: On";
    document.getElementById('music-icon').innerText = "⏸️";
    musicPlaying = true;
  } else {
    audio.pause();
    document.getElementById('music-text').innerText = "Fondo Sinfónico: Off";
    document.getElementById('music-icon').innerText = "🎻";
    musicPlaying = false;
  }
}

window.onload = cargarBaseDatos;
</script>
</body>
</html>
