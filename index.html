<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Calificaciones · Instituto Polivalente San Pedro de Tutule</title>
<!-- Fuentes de Alta Costura y Elegancia -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paleta exacta de tu nueva imagen */
    --color-rosa: #F7CBCA;
    --color-arena: #F1F7F7;
    --color-menta-claro: #D5E5E5;
    --color-menta-medio: #BDD7D6;
    --color-eucalipto: #5D6B6B;
    --text-main: #2C3535; /* Un tono derivado del gris oscuro para máxima lectura */
    --border-fine: #5D6B6B;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Montserrat', sans-serif;
    /* Degradado idéntico al fondo de tu imagen */
    background: linear-gradient(180deg, #BDD7D6 0%, #F1F7F7 50%, #F7CBCA 100%);
    background-attachment: fixed;
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    position: relative;
  }

  /* ================= ARTE FLORAL SOFISTICADO EN EL FONDO ================= */
  /* Flores esquina superior izquierda */
  body::before {
    content: "";
    position: fixed;
    top: -40px;
    left: -40px;
    width: 250px;
    height: 250px;
    background-image: url('https://images.unsplash.com/photo-1526047932273-341f2a7631f9?auto=format&fit=crop&w=500&q=80');
    background-size: cover;
    opacity: 0.12;
    mask-image: radial-gradient(circle, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle, black 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  /* Flores esquina inferior derecha */
  body::after {
    content: "";
    position: fixed;
    bottom: -50px;
    right: -50px;
    width: 300px;
    height: 300px;
    background-image: url('https://images.unsplash.com/photo-1546842931-886c185b4c8c?auto=format&fit=crop&w=500&q=80');
    background-size: cover;
    opacity: 0.12;
    mask-image: radial-gradient(circle, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(circle, black 30%, transparent 80%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    margin-bottom: 35px;
    z-index: 10;
  }

  .inst-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--color-eucalipto);
  }

  .docente-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    font-style: italic;
    color: var(--text-main);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* Tarjeta de Contención de Alta Elegancia */
  .container-card {
    background: rgba(241, 247, 247, 0.85); /* Tono arena suave con ligera transparencia */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--border-fine);
    border-radius: 40px; /* Esquinas curvas súper suaves como tus óvalos */
    max-width: 500px;
    width: 100%;
    margin: 0 auto 40px auto;
    padding: 40px 30px;
    position: relative;
    z-index: 5;
    box-shadow: 0 20px 45px rgba(93, 107, 107, 0.12);
  }

  /* Detalle de ramita botánica fina sobre la tarjeta */
  .card-flower-decor {
    position: absolute;
    top: -20px;
    right: 30px;
    font-size: 35px;
    opacity: 0.7;
    pointer-events: none;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 8px;
    text-align: center;
  }

  .subtitle {
    font-size: 12px;
    color: var(--color-eucalipto);
    text-align: center;
    margin-bottom: 30px;
    letter-spacing: 0.5px;
    line-height: 1.5;
  }

  /* Buscador Estilo Minimalista */
  .search-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 10px;
  }

  input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--border-fine);
    background: transparent;
    padding: 12px 0;
    font-family: 'Montserrat', sans-serif;
    font-size: 16px;
    color: var(--text-main);
    outline: none;
    font-weight: 500;
    text-align: center;
    letter-spacing: 2px;
  }

  /* Botones estilo cápsula fina de la paleta */
  .btn-submit {
    display: block;
    width: 100%;
    background: var(--color-menta-claro);
    color: var(--text-main);
    border: 1px solid var(--border-fine);
    padding: 14px;
    border-radius: 40px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
    text-align: center;
    text-transform: uppercase;
  }

  .btn-submit:hover {
    background: var(--color-rosa);
    transform: translateY(-2px);
  }

  .btn-logout {
    background: transparent;
    font-size: 11px;
    padding: 8px;
    margin-top: 30px;
    border-color: rgba(93, 107, 107, 0.4);
  }

  /* Marco de Foto de Perfil Redondeado Fino */
  .profile-area {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255, 255, 255, 0.5);
    padding: 15px;
    border-radius: 24px;
    border: 1px solid var(--color-menta-medio);
    margin-bottom: 30px;
  }

  .profile-circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 1px solid var(--border-fine);
    background: var(--color-rosa);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-size: 26px;
  }

  .profile-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .file-input-label {
    font-size: 11px;
    background: var(--color-eucalipto);
    color: white;
    padding: 8px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Secciones de Materias Estilo Gourmet */
  .materia-title {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 600;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--color-menta-medio);
    padding-bottom: 8px;
  }

  .parcial-block {
    border: 1px solid var(--border-fine);
    border-radius: 24px;
    padding: 18px;
    margin-bottom: 16px;
    background: #ffffff;
    position: relative;
    overflow: hidden;
  }

  /* Sutil flor de fondo en cada tarjeta de notas */
  .parcial-block::after {
    content: "🌸";
    position: absolute;
    bottom: -10px;
    right: -5px;
    font-size: 40px;
    opacity: 0.05;
    pointer-events: none;
  }

  .parcial-header {
    font-family: 'Playfair Display', serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 15px;
    font-style: italic;
  }

  /* Cuadrícula Limpia de Tareas */
  .grid-activities {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
  }

  .act-box {
    background: var(--color-arena);
    border: 1px solid var(--color-menta-claro);
    border-radius: 14px;
    padding: 10px 4px;
    text-align: center;
  }

  .act-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--color-eucalipto);
  }

  .act-score {
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-top: 3px;
  }

  .score-summary-inline {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 500;
    margin-top: 14px;
    background: var(--color-menta-claro);
    padding: 8px 12px;
    border-radius: 12px;
    letter-spacing: 0.5px;
  }

  .error-msg {
    color: #a34e4e;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    font-weight: 500;
    display: none;
  }

  .hidden { display: none !important; }

  /* Reproductor de Música Minimalista */
  .music-player {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--border-fine);
    border-radius: 40px;
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: 0 10px 25px rgba(93, 107, 107, 0.1);
    z-index: 100;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  .music-player:hover {
    background: var(--color-rosa);
  }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="container-card">
  <!-- Adorno de ramita elegante -->
  <span class="card-flower-decor">🌿</span>

  <!-- ================= PANTALLA 1: LOG IN ================= -->
  <section id="panel-busqueda">
    <h2>Welcome</h2>
    <p class="subtitle">Por favor ingresa tu número de identidad para abrir el reporte académico seguro.</p>

    <div class="search-box">
      <input type="text" id="txt-identidad" placeholder="0801199012345" maxlength="13">
      <button class="btn-submit" onclick="buscarCalificaciones()">Log in</button>
      <div id="error-box" class="error-msg"></div>
    </div>
  </section>

  <!-- ================= PANTALLA 2: BOLETA ALUMNO ================= -->
  <section id="panel-boleta" class="hidden">
    <h2 id="lbl-nombre" style="text-align: left; font-size: 24px;">Estudiante</h2>
    <p class="subtitle" id="lbl-identidad" style="text-align: left; margin-bottom: 20px;">ID: 0000000000000</p>

    <!-- Subir Foto Organizado -->
    <div class="profile-area">
      <div class="profile-circle" id="avatar-preview">🌿</div>
      <div>
        <span style="display:block; font-size:12px; font-weight:600; margin-bottom:6px; color: var(--color-eucalipto);">Fotografía del Alumno</span>
        <label class="file-input-label">
          Cargar Imagen
          <input type="file" id="photo-upload" accept="image/*" style="display: none;" onchange="previewImage(event)">
        </label>
      </div>
    </div>

    <!-- Contenedor Dinámico de Materias -->
    <div id="materias-container"></div>

    <button class="btn-submit btn-logout" onclick="salirSistema()">Cerrar Sesión</button>
  </section>
</div>

<!-- CONTROL DE AUDIO FLOTANTE -->
<div class="music-player" onclick="toggleMusic()">
  <span id="music-icon">🌸</span>
  <span id="music-text">Audio: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;

// Conexión automática al archivo JSON de tu repositorio
function cargarBaseDatos() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(response => { if (!response.ok) throw new Error(); return response.json(); })
    .then(data => { NOTAS_ALUMNOS = data; })
    .catch(err => { console.error("Error cargando el archivo notas_alumnos.json"); });
}

function buscarCalificaciones() {
  const idBusqueda = document.getElementById('txt-identidad').value.trim();
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (idBusqueda.length !== 13) {
    errorBox.textContent = "La identidad debe constar exactamente de 13 dígitos.";
    errorBox.style.display = 'block';
    return;
  }

  if (!NOTAS_ALUMNOS) {
    errorBox.textContent = "Base de datos no disponible transitoriamente.";
    errorBox.style.display = 'block';
    return;
  }

  const alumno = NOTAS_ALUMNOS[idBusqueda];
  if (!alumno) {
    errorBox.textContent = "No se localizó ningún alumno con esa identidad.";
    errorBox.style.display = 'block';
    return;
  }

  document.getElementById('lbl-nombre').textContent = alumno.nombre;
  document.getElementById('lbl-identidad').textContent = "Identidad: " + idBusqueda;

  const container = document.getElementById('materias-container');
  container.innerHTML = '';

  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia];
    const divMateria = document.createElement('div');
    divMateria.style.marginTop = "25px";
    
    divMateria.innerHTML = `
      <div class="materia-title">
        <span>📚 ${materia.replace(/_/g, ' ').toUpperCase()}</span>
        <span style="font-family:'Montserrat',sans-serif; font-size:13px; font-weight:700; background:var(--color-rosa); padding:2px 10px; border-radius:20px;">PROMEDIO: ${notas.promedioAnual}%</span>
      </div>
      <div class="parciales-list"></div>
    `;
    
    const parcialesList = divMateria.querySelector('.parciales-list');
    const parciales = ['I', 'II', 'III', 'IV'];

    parciales.forEach(p => {
      const pData = notas[p];
      let nombresAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct && pData.nombresAct.length === 6) {
        nombresAct = pData.nombresAct;
      }

      const blockParcial = document.createElement('div');
      blockParcial.className = 'parcial-block';
      
      if (!(pData && pData.cursado)) {
        blockParcial.style.opacity = "0.4";
      }

      let gridHtml = '';
      let listaActs = pData && pData.act ? pData.act : Array(6).fill('');

      for(let i=0; i<6; i++) {
        gridHtml += `
          <div class="act-box">
            <div class="act-title">${nombresAct[i]}</div>
            <div class="act-score">${listaActs[i] !== '' ? listaActs[i] : '-'}</div>
          </div>
        `;
      }

      blockParcial.innerHTML = `
        <div class="parcial-header">
          <span>${p} Parcial</span>
          <span style="font-family:'Montserrat',sans-serif; font-weight:700; font-style:normal; font-size:12px;">Nota: ${pData && pData.cursado ? pData.total + '%' : '-'}</span>
        </div>
        <div class="grid-activities">${gridHtml}</div>
        <div class="score-summary-inline">
          <span>Acumulado: ${pData && pData.cursado ? pData.acum.toFixed(1) : '-'} / 50</span>
          <span>Examen: ${pData && pData.cursado ? pData.examen : '-'} / 50</span>
        </div>
      `;
      parcialesList.appendChild(blockParcial);
    });

    container.appendChild(divMateria);
  });

  document.getElementById('panel-busqueda').classList.add('hidden');
  document.getElementById('panel-boleta').classList.remove('hidden');
}

function salirSistema() {
  document.getElementById('txt-identidad').value = '';
  document.getElementById('panel-boleta').classList.add('hidden');
  document.getElementById('panel-busqueda').classList.remove('hidden');
}

function previewImage(event) {
  const reader = new FileReader();
  reader.onload = function() {
    document.getElementById('avatar-preview').innerHTML = `<img src="${reader.result}">`;
  }
  reader.readAsDataURL(event.target.files[0]);
}

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) {
    audio.play().catch(() => {});
    document.getElementById('music-text').innerText = "Audio: On";
    document.getElementById('music-icon').innerText = "🌸";
    musicPlaying = true;
  } else {
    audio.pause();
    document.getElementById('music-text').innerText = "Audio: Off";
    document.getElementById('music-icon').innerText = "🌷";
    musicPlaying = false;
  }
}

window.onload = cargarBaseDatos;
</script>
</body>
</html>
