<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Estudiantil — IPSPT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<style>
:root{
  --rose:#C71585;--rose-dark:#8B0057;--rose-mid:#D81B8C;
  --rose-pale:#FFC0CB;--rose-blush:#FFE4EE;--rose-ultra:#FFF5F8;
  --teal:#20B2AA;--teal-dark:#178B84;
  --pass:#1E8B4A;--pass-bg:#E8F5EE;--fail:#B34040;--fail-bg:#FDEAEA;
  --text:#2D1B3D;--text-md:#7B3557;--text-sm:#A06080;
  --border:rgba(255,192,203,.5);--shadow:0 8px 32px rgba(199,21,133,.12),0 2px 8px rgba(199,21,133,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;
  background:
    radial-gradient(ellipse at 5% 15%,rgba(255,192,203,.4) 0%,transparent 50%),
    radial-gradient(ellipse at 95% 85%,rgba(32,178,170,.25) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 5%,rgba(199,21,133,.12) 0%,transparent 45%),
    linear-gradient(150deg,#FFF5F8 0%,#FFE4EE 40%,#F0FFFE 100%);
  background-attachment:fixed;-webkit-font-smoothing:antialiased;
}
.bg-flowers{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:10;}
.login-card{
  background:rgba(255,255,255,.93);backdrop-filter:blur(24px);
  border-radius:32px;box-shadow:0 20px 60px rgba(199,21,133,.18),0 4px 16px rgba(199,21,133,.10),inset 0 2px 0 rgba(255,255,255,.95);
  border:1.5px solid rgba(255,192,203,.5);padding:48px 44px 44px;
  width:100%;max-width:460px;text-align:center;position:relative;overflow:hidden;
  animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both;
}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--rose-dark),var(--rose),var(--teal));border-radius:32px 32px 0 0;}
.login-card::after{content:'🌸';position:absolute;top:14px;right:18px;font-size:24px;opacity:.4;animation:sway 5s ease-in-out infinite;}
.login-logo{width:98px;height:98px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,192,203,.6);box-shadow:0 8px 28px rgba(199,21,133,.22),0 0 0 6px rgba(255,192,203,.25);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;background:var(--rose-ultra);}
.login-logo img{width:100%;height:100%;object-fit:cover;}
.school-name{font-family:'Playfair Display',serif;font-size:21px;font-weight:800;background:linear-gradient(135deg,var(--rose-dark),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.25;}
.teacher-name{font-family:'Dancing Script',cursive;font-size:26px;font-weight:700;color:var(--teal-dark);margin-top:6px;opacity:.95;}
.login-desc{font-size:12px;color:var(--text-sm);margin-top:4px;margin-bottom:28px;}
.login-inp-wrap{position:relative;margin-bottom:16px;}
.login-inp-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-sm);font-size:14px;}
.login-inp-wrap input{width:100%;padding:13px 14px 13px 40px;background:var(--rose-ultra);border:1.5px solid rgba(255,192,203,.5);border-radius:14px;font-size:15px;font-family:'Inter',sans-serif;color:var(--text);letter-spacing:2px;outline:none;transition:border-color .2s,box-shadow .2s;}
.login-inp-wrap input::placeholder{letter-spacing:.5px;color:var(--text-sm);}
.login-inp-wrap input:focus{border-color:var(--rose);box-shadow:0 0 0 4px rgba(199,21,133,.10);background:#fff;}
#login-error{font-size:12px;color:var(--fail);background:var(--fail-bg);padding:8px 14px;border-radius:10px;margin-bottom:12px;display:none;text-align:left;}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--rose-dark),var(--rose),var(--rose-mid));color:#fff;border:none;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 6px 24px rgba(199,21,133,.35);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em;}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(199,21,133,.45);}
.music-hint{margin-top:14px;font-size:11px;color:var(--text-sm);display:flex;align-items:center;justify-content:center;gap:6px;}

/* PORTAL */
#portal{display:none;min-height:100vh;position:relative;z-index:5;}
#portal.visible{display:block;}

.portal-header{
  background:linear-gradient(135deg,#6B0040 0%,#8B0057 30%,#C71585 70%,#D81B8C 100%);
  padding:24px 28px 28px;position:relative;overflow:hidden;
}
.portal-header::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(255,192,203,.15) 0%,transparent 60%);pointer-events:none;}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.header-logo{width:56px;height:56px;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.15);border:2px solid rgba(255,192,203,.4);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.header-logo img{width:100%;height:100%;object-fit:cover;border-radius:12px;}
.header-text .titulo{font-family:'Playfair Display',serif;font-size:19px;font-weight:800;color:#fff;line-height:1.2;}
.header-text .docente{font-family:'Dancing Script',cursive;font-size:20px;color:rgba(255,192,203,.95);margin-top:3px;font-weight:700;}
.header-actions{margin-left:auto;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.btn-music{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;}
.btn-music:hover{background:rgba(255,255,255,.28);}
.btn-music.playing{background:rgba(32,178,170,.4);border-color:var(--teal);}
.btn-salir{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:10px;color:rgba(255,255,255,.85);padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-salir:hover{background:rgba(255,80,80,.3);color:#fff;}
.alu-badge{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,192,203,.4);border-radius:10px;padding:6px 14px;display:flex;align-items:center;gap:8px;}
.alu-badge-txt .name{font-size:13px;font-weight:700;color:#fff;}
.alu-badge-txt .id{font-size:10px;color:rgba(255,192,203,.8);}
.alu-avatar-hdr{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-pale));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;border:2px solid rgba(255,255,255,.35);overflow:hidden;flex-shrink:0;}

.portal-content{max-width:900px;margin:0 auto;padding:28px 20px;}

/* FOTO CARD */
.foto-card{background:rgba(255,255,255,.9);backdrop-filter:blur(12px);border:1.5px solid var(--border);border-radius:22px;padding:24px;box-shadow:var(--shadow);margin-bottom:20px;position:relative;overflow:hidden;}
.foto-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--rose-dark),var(--rose),var(--teal));}
.foto-card-inner{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.foto-preview-wrap{position:relative;flex-shrink:0;cursor:pointer;}
.foto-circle{width:88px;height:88px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,192,203,.6);box-shadow:0 4px 16px rgba(199,21,133,.18);}
.foto-circle img{width:100%;height:100%;object-fit:cover;}
.foto-fallback{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--rose),var(--rose-pale));display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#fff;border:3px solid rgba(255,192,203,.5);box-shadow:0 4px 16px rgba(199,21,133,.18);}
.foto-overlay{position:absolute;inset:0;background:rgba(199,21,133,.45);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.foto-preview-wrap:hover .foto-overlay{opacity:1;}
.foto-info .alu-nombre-big{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--rose-dark),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.foto-info .alu-datos{font-size:12px;color:var(--text-sm);margin-top:4px;}
.alu-genero{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:8px;}
.genero-f{background:#FCE4EC;color:#C2185B;}
.genero-m{background:#E3F2FD;color:#1565C0;}
.btn-foto{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;background:linear-gradient(135deg,var(--teal-dark),var(--teal));color:#fff;border:none;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(32,178,170,.3);transition:all .2s;margin-top:10px;}
.btn-foto:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(32,178,170,.4);}
.upload-progress{height:6px;background:rgba(255,192,203,.3);border-radius:3px;margin-top:10px;overflow:hidden;display:none;}
.upload-progress-bar{height:100%;background:linear-gradient(90deg,var(--teal-dark),var(--teal));border-radius:3px;transition:width .3s;}

/* RESUMEN */
.resumen-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.resumen-stat{background:rgba(255,255,255,.9);border:1.5px solid var(--border);border-radius:18px;padding:18px;text-align:center;box-shadow:0 4px 16px rgba(199,21,133,.07);transition:transform .2s;}
.resumen-stat:hover{transform:translateY(-3px);}
.resumen-stat .icon{font-size:26px;margin-bottom:8px;}
.resumen-stat .val{font-size:28px;font-weight:800;background:linear-gradient(135deg,var(--rose-dark),var(--rose));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.resumen-stat .lbl{font-size:11px;color:var(--text-sm);margin-top:2px;}

/* ASIGNATURAS */
.asig-section{margin-bottom:14px;}
.asig-header{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.92);border:1.5px solid var(--border);border-radius:16px;padding:16px 20px;cursor:pointer;transition:all .2s;box-shadow:0 2px 10px rgba(199,21,133,.05);}
.asig-header:hover{border-color:var(--rose);box-shadow:0 4px 20px rgba(199,21,133,.12);}
.asig-header.open{border-radius:16px 16px 0 0;border-color:var(--rose);}
.asig-title-row{display:flex;align-items:center;gap:12px;}
.asig-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--rose-dark),var(--rose));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0;box-shadow:0 4px 12px rgba(199,21,133,.28);}
.asig-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text);}
.asig-sub{font-size:10px;color:var(--text-sm);margin-top:1px;}
.asig-prom-big{font-size:26px;font-weight:800;color:var(--rose);display:flex;align-items:center;gap:8px;}
.pass-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--pass-bg);color:var(--pass);}
.fail-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--fail-bg);color:var(--fail);}
.asig-body{background:rgba(255,255,255,.96);border:1.5px solid var(--rose);border-top:none;border-radius:0 0 16px 16px;padding:16px 20px;display:none;}
.asig-body.open{display:block;}
.parciales-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px;}
.parcial-card{background:var(--rose-ultra);border:1.5px solid rgba(255,192,203,.4);border-radius:14px;padding:14px;}
.parcial-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--rose-dark);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.parcial-prom{font-size:18px;font-weight:800;color:var(--rose);}
.parcial-prom.pass{color:var(--pass);}
.parcial-prom.fail{color:var(--fail);}
.desglose-list{display:flex;flex-direction:column;gap:4px;margin-top:6px;}
.desglose-row{display:flex;justify-content:space-between;font-size:11px;}
.desglose-label{color:var(--text-md);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
.desglose-val{font-weight:700;color:var(--text);flex-shrink:0;margin-left:6px;}
hr.dv{border:none;border-top:1px dashed rgba(255,192,203,.6);margin:5px 0;}
.acum-row{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--text-md);}
.exam-row{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--teal-dark);}
.total-row{display:flex;justify-content:space-between;font-size:13px;font-weight:800;margin-top:6px;border-top:1.5px solid rgba(199,21,133,.2);padding-top:6px;}
.total-row .pass{color:var(--pass);}
.total-row .fail{color:var(--fail);}
.pending-txt{font-size:11px;color:var(--text-sm);font-style:italic;margin-top:4px;}

.loading-spinner{width:48px;height:48px;border:3px solid rgba(255,192,203,.35);border-top-color:var(--rose);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}

/* MUSIC VIZ */
.music-viz{display:flex;align-items:flex-end;gap:2px;height:16px;}
.music-viz .bar{width:3px;height:6px;background:rgba(255,255,255,.8);border-radius:2px;animation:musicBar 1.2s ease-in-out infinite;}
.music-viz .bar:nth-child(2){animation-delay:.2s;height:10px;}
.music-viz .bar:nth-child(3){animation-delay:.4s;height:7px;}
.music-viz .bar:nth-child(4){animation-delay:.1s;height:11px;}
.music-viz .bar:nth-child(5){animation-delay:.35s;height:8px;}

#toast{position:fixed;bottom:24px;right:24px;z-index:999;padding:12px 18px;border-radius:14px;font-size:13px;font-weight:600;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,.22);transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;max-width:320px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.success{background:var(--pass);}
#toast.error{background:var(--fail);}
#toast.info{background:var(--rose);}

@keyframes slideUp{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes sway{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes musicBar{0%,100%{height:4px;}50%{height:14px;}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeInUp .3s ease both;}
.hidden{display:none !important;}
@media(max-width:600px){.login-card{padding:36px 24px 32px;}.header-inner{gap:10px;}.portal-content{padding:16px 12px;}.parciales-grid{grid-template-columns:1fr;}.asig-prom-big{font-size:20px;}}
</style>
</head>

<script>
/* ============================================================
   CONFIG FIREBASE
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyDTejqs2pgdGyTw1GNBhCr__joDXqpvnZk",
  authDomain:        "portal-ips-san-pedro.firebaseapp.com",
  projectId:         "portal-ips-san-pedro",
  storageBucket:     "portal-ips-san-pedro.firebasestorage.app",
  messagingSenderId: "992828018359",
  appId:             "1:992828018359:web:a4419792d82580d21c0732"
};

let db = null, storage = null;
let alumnoActual = null;
let cursosDelAlumno = [];

window.onload = function() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db      = firebase.firestore();
    storage = firebase.storage();
  } catch(e) {
    console.warn('Firebase init:', e);
  }
};

/* ============================================================
   BUSCAR ALUMNO
   ============================================================ */
async function buscarAlumno() {
  const idInput = document.getElementById('inp-identidad').value.trim().replace(/\D/g,'');
  const errEl   = document.getElementById('login-error');
  errEl.style.display = 'none';

  if (idInput.length !== 13) {
    errEl.textContent = 'La identidad debe tener exactamente 13 dígitos.';
    errEl.style.display = 'block';
    return;
  }

  showLoading('Buscando tus notas…');
  try {
    const snap = await db.collection('cursos').get();
    if (snap.empty) {
      hideLoading();
      showError('No hay datos registrados aún. Consulta a tu docente.');
      return;
    }
    let encontrado = false;
    let infoAlumno = null;
    cursosDelAlumno = [];
    snap.forEach(doc => {
      const curso = doc.data();
      const al = (curso.alumnos || []).find(a => a.id === idInput);
      if (al) {
        if (!encontrado) { encontrado = true; infoAlumno = al; }
        cursosDelAlumno.push({
          cursoKey: doc.id,
          cursoNombre: curso.nombre,
          parciales: curso.parciales || {},
          actividadesNombres: curso.actividadesNombres || {}
        });
      }
    });
    hideLoading();
    if (!encontrado) {
      showError('No se encontró alumno con esa identidad. Verifica el número.');
      return;
    }
    alumnoActual = infoAlumno;
    mostrarPortal();
  } catch(e) {
    hideLoading();
    showError('Error de conexión: ' + e.message);
  }
}

function showError(msg) {
  const e = document.getElementById('login-error');
  e.textContent = msg; e.style.display = 'block';
}

/* ============================================================
   MOSTRAR PORTAL
   ============================================================ */
function mostrarPortal() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('portal').style.display = 'block';

  document.getElementById('header-name').textContent = alumnoActual.nombre;
  document.getElementById('header-id').textContent   = alumnoActual.id;
  document.getElementById('alu-nombre-big').textContent = alumnoActual.nombre;
  document.getElementById('alu-datos-txt').textContent  = 'ID: ' + alumnoActual.id;

  const genLabel = alumnoActual.genero === 'F' ? '👩 Alumna' : '👨 Alumno';
  document.getElementById('alu-genero-badge').textContent = genLabel;

  const initials = alumnoActual.nombre.trim().split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const fb = document.getElementById('foto-fallback-el');
  fb.textContent = initials;
  fb.style.cssText = 'display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:28px;font-weight:800;color:var(--rose-dark);background:var(--rose-ultra);border-radius:50%;';
  document.getElementById('alu-av-hdr').textContent = initials.charAt(0);
  document.getElementById('alu-av-hdr').style.cssText = 'display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:var(--rose-ultra);color:var(--rose-dark);font-weight:800;font-size:15px;';

  if (alumnoActual.foto) {
    const fw = document.getElementById('foto-circle-wrap');
    fw.innerHTML = `<img src="${alumnoActual.foto}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  }

  renderAsignaturas();
  setTimeout(() => { try { iniciarMusica(); } catch(e) {} }, 900);
}

/* ============================================================
   RENDER ASIGNATURAS
   ============================================================ */
function renderAsignaturas() {
  const container = document.getElementById('asignaturas-container');
  container.innerHTML = '';
  if (cursosDelAlumno.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-sm);">Sin asignaturas registradas.</div>';
    return;
  }
  cursosDelAlumno.forEach((curso, ci) => {
    const cardId = 'asig-' + ci;
    const card = document.createElement('div');
    card.className = 'asig-section';
    card.id = cardId;
    let sumaTotales = 0, cursados = 0;
    const pd = {};
    ['I','II','III','IV'].forEach(p => {
      const r = calcularParcial(curso, p);
      pd[p] = r;
      if (r.cursado) { sumaTotales += r.total; cursados++; }
    });
    const promAnual = cursados > 0 ? Math.round(sumaTotales / cursados) : null;
    const paso = promAnual !== null && promAnual >= 60;
    const promHtml = promAnual !== null
      ? `<div class="asig-prom-big"><span class="${paso?'pass-badge':'fail-badge'}">${paso?'APROBADO':'REPROBADO'}</span>${promAnual}</div>`
      : `<div style="font-size:12px;color:var(--text-sm)">Sin notas</div>`;
    card.innerHTML = `
      <div class="asig-header" onclick="toggleCard('${cardId}')">
        <div class="asig-title-row">
          <div class="asig-icon"><i class="fa fa-book-open"></i></div>
          <div><div class="asig-name">${curso.cursoNombre}</div><div class="asig-sub">${cursados} parcial(es) cursado(s)</div></div>
        </div>
        ${promHtml}
      </div>
      <div class="asig-body">
        ${renderParciales(pd, curso)}
        ${promAnual!==null?`<div style="margin-top:12px;background:var(--rose-ultra);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;"><div><div style="font-weight:700;font-size:13px;color:var(--text);">Promedio Anual</div><div style="font-size:11px;color:var(--text-sm);">${cursados} parcial(es)</div></div><div style="font-size:28px;font-weight:800;color:${paso?'var(--pass)':'var(--fail)'};">${promAnual}</div></div>`:''}
      </div>`;
    container.appendChild(card);
    if (ci === 0) toggleCard(cardId);
  });
}

function renderParciales(pd, curso) {
  let h = '<div class="parciales-grid">';
  ['I','II','III','IV'].forEach(p => {
    const d = pd[p];
    h += `<div class="parcial-card"><div class="parcial-title"><span>${p} Parcial</span>${d.cursado?`<span class="${d.total>=60?'pass-badge':'fail-badge'}">${d.total>=60?'APR':'REP'}</span>`:''}</div>`;
    if (!d.cursado) {
      h += '<div class="pending-txt">Sin notas registradas</div>';
    } else {
      h += `<div class="parcial-prom ${d.total>=60?'pass':'fail'}">${d.total}</div><div class="desglose-list">`;
      const nombres = curso.actividadesNombres?.[p] || [];
      (d.act||[]).forEach((v,i) => {
        if (v!==''&&v!==undefined&&v!==null)
          h += `<div class="desglose-row"><span class="desglose-label">${nombres[i]||'Act. '+(i+1)}</span><span class="desglose-val">${parseFloat(v)||0}</span></div>`;
      });
      h += `</div><hr class="dv"><div class="acum-row"><span>Acumulado</span><span>${d.acum}</span></div><div class="exam-row"><span>Examen</span><span>${d.examen}</span></div><div class="total-row"><span>Total Parcial</span><span class="${d.total>=60?'pass':'fail'}">${d.total}</span></div>`;
    }
    h += '</div>';
  });
  return h + '</div>';
}

function calcularParcial(curso, pKey) {
  const pData = (curso.parciales||{})[pKey]||{};
  const n = (pData.notas||{})[alumnoActual.id]||{act:Array(6).fill(''),examen:''};
  let acum=0;
  (n.act||[]).forEach(v=>acum+=(parseFloat(v)||0));
  const examen=parseFloat(n.examen)||0;
  const total=Math.round(acum+examen);
  const cursado=(n.act||[]).some(v=>v!==''&&v!==null&&v!==undefined)||n.examen!=='';
  return {act:n.act,acum:parseFloat(acum.toFixed(1)),examen,total,cursado};
}

function toggleCard(id) {
  const card = document.getElementById(id);
  card.querySelector('.asig-header').classList.toggle('open');
  card.querySelector('.asig-body').classList.toggle('open');
}

/* ============================================================
   SUBIR FOTO
   ============================================================ */
async function subirFoto(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 3*1024*1024) { toast('Imagen muy grande. Máx 3 MB.','error'); return; }
  showLoading('Subiendo tu foto…');
  try {
    const ref = storage.ref(`fotos_alumnos/${alumnoActual.id}.jpg`);
    await ref.put(file, {contentType: file.type});
    const url = await ref.getDownloadURL();
    const snap = await db.collection('cursos').get();
    const updates = [];
    snap.forEach(doc => {
      const data = doc.data();
      const alumnos = data.alumnos||[];
      const idx = alumnos.findIndex(a=>a.id===alumnoActual.id);
      if (idx !== -1) { alumnos[idx].foto = url; updates.push(db.collection('cursos').doc(doc.id).update({alumnos})); }
    });
    await Promise.all(updates);
    alumnoActual.foto = url;
    const fw = document.getElementById('foto-circle-wrap');
    fw.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    hideLoading();
    toast('¡Foto actualizada! ✓','success');
  } catch(e) {
    hideLoading();
    toast('Error al subir: '+e.message,'error');
  }
  input.value='';
}

/* ============================================================
   MÚSICA — CLARO DE LUNA (Beethoven Op.27 No.2 Mvt.I)
   ============================================================ */
/* ===== LO-FI POP ===== */
let audioCtx=null,musicPlaying=false,musicNodes=[],musicLoopId=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function mkReverb(ctx){
  const conv=ctx.createConvolver();
  const len=Math.floor(ctx.sampleRate*2.8);
  const buf=ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2);}
  conv.buffer=buf;return conv;
}
function piano(freq,t,dur,vol,dst){
  const o=audioCtx.createOscillator(),o2=audioCtx.createOscillator();
  const lp=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
  lp.type='lowpass';lp.frequency.value=1800;
  o.type='triangle';o.frequency.value=freq;
  o2.type='sine';o2.frequency.value=freq*2.005;
  const g2=audioCtx.createGain();g2.gain.value=0.25;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.018);
  g.gain.exponentialRampToValueAtTime(vol*0.35,t+0.12);g.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.88);
  o.connect(lp);o2.connect(g2);g2.connect(lp);lp.connect(g);g.connect(dst);
  o.start(t);o.stop(t+dur+0.08);o2.start(t);o2.stop(t+dur+0.08);
}
function bass(freq,t,dur,vol,dst){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=280;
  o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.06);g.gain.exponentialRampToValueAtTime(0.0001,t+dur*0.82);
  o.connect(lp);lp.connect(g);g.connect(dst);
  o.start(t);o.stop(t+dur+0.08);
}
const H={F2:87.31,A2:110,Bb2:116.54,D3:146.83,F3:174.61,A3:220,Bb3:233.08,C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,Bb4:466.16,C5:523.25,D5:587.33,E5:659.25,F5:698.46};
const BPM=84,LB=60/BPM;
let rvb=null,mst=null;
function lofi(t0){
  const R=rvb;
  function p(f,bt,d,v=0.072){piano(f,t0+bt*LB,d*LB,v,R);}
  function b(f,bt,d,v=0.085){bass(f,t0+bt*LB,d*LB,v,R);}
  function pad(fa,bt,d){fa.forEach(f=>p(f,bt,d,0.024));}
  // Fmaj7
  b(H.F2,0,4);pad([H.F4,H.A4,H.C5,H.E5],0,3.8);
  p(H.C5,0,1);p(H.E5,1,0.5);p(H.F5,1.5,0.5);p(H.E5,2,1);p(H.C5,3,1,0.06);
  // Am7
  b(H.A2,4,4);pad([H.A3,H.C4,H.E4,H.G4],4,3.8);
  p(H.A4,4,1);p(H.C5,5,0.5);p(H.E5,5.5,1.5);p(H.D5,7,1,0.06);
  // Dm7
  b(H.D3,8,4);pad([H.D4,H.F4,H.A4,H.C5],8,3.8);
  p(H.D5,8,1);p(H.A4,9,0.5);p(H.C5,9.5,1);p(H.A4,10.5,0.5);p(H.F4,11,1,0.06);
  // Bbmaj7
  b(H.Bb2,12,4);pad([H.Bb3,H.D4,H.F4,H.A4],12,3.8);
  p(H.C5,12,0.5);p(H.D5,12.5,1);p(H.C5,13.5,0.5);p(H.A4,14,1);p(H.F4,15,1,0.08);
  // Fmaj7 (repeat)
  b(H.F2,16,4);pad([H.F4,H.A4,H.C5,H.E5],16,3.8);
  p(H.E5,16,2);p(H.C5,18,1);p(H.A4,19,1,0.06);
  // Am7
  b(H.A2,20,4);pad([H.A3,H.C4,H.E4,H.G4],20,3.8);
  p(H.C5,20,0.5);p(H.E5,20.5,1);p(H.D5,21.5,0.5);p(H.C5,22,2,0.06);
  // Dm7
  b(H.D3,24,4);pad([H.D4,H.F4,H.A4,H.C5],24,3.8);
  p(H.F4,24,0.5);p(H.A4,24.5,1);p(H.C5,25.5,0.5);p(H.D5,26,2,0.06);
  // Bbmaj7 → resolve
  b(H.Bb2,28,4);pad([H.Bb3,H.D4,H.F4,H.A4],28,3.8);
  p(H.C5,28,1);p(H.Bb4,29,1);p(H.A4,30,1);p(H.F4,31,1,0.09);
  return 32;
}
function iniciarMusica(){
  try{
    initAudio();if(musicPlaying)return;musicPlaying=true;
    rvb=mkReverb(audioCtx);mst=audioCtx.createGain();mst.gain.value=0.72;
    rvb.connect(mst);mst.connect(audioCtx.destination);musicNodes=[rvb,mst];
    function tocar(){const tb=lofi(audioCtx.currentTime+0.15);musicLoopId=setTimeout(tocar,(tb*LB-0.3)*1000);}
    tocar();
    document.getElementById('btn-music').classList.add('playing');
    document.getElementById('music-viz').classList.remove('hidden');
    document.getElementById('music-icon').classList.add('hidden');
    document.getElementById('music-label').textContent='♩ Lo-fi';
  }catch(e){console.warn('Audio:',e);}
}
function detenerMusica(){
  musicPlaying=false;clearTimeout(musicLoopId);
  if(mst){mst.gain.setValueAtTime(mst.gain.value,audioCtx.currentTime);mst.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.3);}
  setTimeout(()=>{musicNodes.forEach(n=>{try{n.disconnect();}catch(e){}});musicNodes=[];rvb=null;mst=null;},320);
  document.getElementById('btn-music').classList.remove('playing');
  document.getElementById('music-viz').classList.add('hidden');
  document.getElementById('music-icon').classList.remove('hidden');
  document.getElementById('music-label').textContent='Música';
}
function toggleMusic(){if(musicPlaying)detenerMusica();else iniciarMusica();}

function salir(){
  if(musicPlaying)detenerMusica();
  alumnoActual=null;cursosDelAlumno=[];
  document.getElementById('inp-identidad').value='';
  document.getElementById('login-error').style.display='none';
  document.getElementById('portal').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
</script>
