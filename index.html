<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Calificaciones Oficial · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    /* Paleta cromática exacta de image_396b7b.png */
    --c-dark-1: #190019;
    --c-purple-2: #2B124C;
    --c-plum-3: #522B5B;
    --c-berry-4: #854F6C;
    --c-nude-5: #DFB6B2;
    --c-cream-6: #FBE4D8;
    
    --text-primary: #190019;
  }

  *, *::before, *::after { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  body {
    font-family: 'Montserrat', sans-serif;
    /* Recreación exacta del entorno degradado de la imagen */
    background: radial-gradient(circle at center, var(--c-berry-4) 0%, var(--c-plum-3) 40%, var(--c-purple-2) 75%, var(--c-dark-1) 100%);
    background-attachment: fixed;
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 50px 20px;
    position: relative;
    overflow-x: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 50px;
    z-index: 10;
  }

  /* Nombre del Colegio: El elemento más grande, majestuoso e imponente */
  .inst-title {
    font-family: 'Cinzel', serif;
    font-size: 32px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--c-cream-6);
    line-height: 1.2;
    text-shadow: 0 4px 20px rgba(25, 0, 25, 0.85);
    max-width: 800px;
    margin: 0 auto;
  }

  .docente-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--c-nude-5);
    margin-top: 15px;
    letter-spacing: 5px;
    text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
  }

  /* PANEL PRINCIPAL REALISTA DE ALTA INGENIERÍA */
  .container-card {
    background: var(--c-cream-6);
    border: 3px solid var(--c-dark-1);
    border-radius: 40px; 
    max-width: 540px;
    width: 100%;
    margin: 0 auto 50px auto;
    padding: 55px 40px;
    position: relative;
    z-index: 5;
    box-shadow: 
      0 30px 80px rgba(25, 0, 25, 0.65),
      inset 0 2px 0px rgba(255, 255, 255, 0.8);
  }

  h2 {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    font-weight: 800;
    margin-bottom: 15px;
    text-align: center;
    letter-spacing: 2px;
    color: var(--c-dark-1);
  }

  .subtitle {
    font-size: 13px;
    color: var(--c-berry-4);
    text-align: center;
    margin-bottom: 45px;
    letter-spacing: 0.5px;
    font-weight: 600;
    line-height: 1.6;
  }

  .search-box {
    display: flex;
    flex-direction: column;
    gap: 25px;
  }

  input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 3px solid var(--c-dark-1);
    background: transparent;
    padding: 12px 0;
    font-family: 'Montserrat', sans-serif;
    font-size: 20px;
    color: var(--c-dark-1);
    outline: none;
    font-weight: 800;
    text-align: center;
    letter-spacing: 4px;
  }

  .btn-submit {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, var(--c-purple-2) 0%, var(--c-plum-3) 100%);
    color: var(--c-cream-6);
    border: 3px solid var(--c-dark-1);
    padding: 18px;
    border-radius: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 3px;
    cursor: pointer;
    margin-top: 15px;
    transition: all 0.15s ease;
    text-align: center;
    text-transform: uppercase;
    box-shadow: 0 6px 0px var(--c-dark-1);
  }

  .btn-submit:active {
    transform: translateY(6px);
    box-shadow: 0 0px 0px var(--c-dark-1);
  }

  .btn-logout {
    background: transparent;
    color: var(--c-dark-1);
    font-size: 11px;
    padding: 10px;
    margin-top: 40px;
    box-shadow: none;
    border: 2px solid rgba(25, 0, 25, 0.3);
  }

  .profile-area {
    display: flex;
    align-items: center;
    gap: 20px;
    background: #FFFFFF;
    padding: 18px;
    border-radius: 24px;
    border: 3px solid var(--c-dark-1);
    margin-bottom: 40px;
    box-shadow: inset 0 3px 6px rgba(0,0,0,0.08);
  }

  .profile-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 3px solid var(--c-dark-1);
    background: var(--c-nude-5);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .profile-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .file-input-label {
    font-size: 11px;
    background: var(--c-dark-1);
    color: #FFFFFF;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .materia-title {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 800;
    margin-top: 50px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--c-dark-1);
    padding-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .promedio-badge {
    font-family: 'Montserrat', sans-serif; 
    font-size: 13px; 
    font-weight: 800; 
    background: var(--c-dark-1); 
    color: var(--c-cream-6);
    padding: 6px 16px; 
    border-radius: 24px;
  }

  /* ARQUITECTURA DE PANEL PARCIAL EN 3D REAL */
  .parcial-block {
    border: 3px solid var(--c-dark-1);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 45px;
    background: #FFFFFF;
    position: relative;
    transition: transform 0.2s ease;
    box-shadow: 
      0px 1px 0px var(--c-nude-5),
      0px 2px 0px var(--c-berry-4),
      0px 4px 0px var(--c-plum-3),
      0px 6px 0px var(--c-dark-1),
      0px 15px 25px rgba(25, 0, 25, 0.15);
  }

  .parcial-block:hover {
    transform: translateY(-2px);
    box-shadow: 
      0px 1px 0px var(--c-nude-5),
      0px 3px 0px var(--c-berry-4),
      0px 5px 0px var(--c-plum-3),
      0px 8px 0px var(--c-dark-1),
      0px 20px 30px rgba(25, 0, 25, 0.2);
  }

  .parcial-header {
    font-family: 'Cinzel', serif;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 800;
    font-size: 18px;
    color: var(--c-dark-1);
    border-bottom: 2px solid rgba(25, 0, 25, 0.1);
    padding-bottom: 10px;
  }

  .grid-activities {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
  }

  .act-box {
    background: var(--c-cream-6);
    border: 2px solid var(--c-dark-1);
    border-radius: 14px;
    padding: 14px 4px;
    text-align: center;
    box-shadow: inset 0 2px 4px rgba(25, 0, 25, 0.05);
  }

  .act-title {
    font-size: 11px;
    font-weight: 800;
    color: var(--c-berry-4);
    text-transform: uppercase;
  }

  .act-score {
    font-family: 'Montserrat', sans-serif;
    font-size: 17px;
    font-weight: 800;
    margin-top: 6px;
    color: var(--c-dark-1);
  }

  .score-summary-inline {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 800;
    margin-top: 20px;
    background: var(--c-nude-5);
    padding: 12px 16px;
    border-radius: 14px;
    border: 2px solid var(--c-dark-1);
    color: var(--c-dark-1);
  }

  .error-msg {
    color: #901A1A;
    font-size: 14px;
    margin-top: 15px;
    text-align: center;
    font-weight: 700;
    display: none;
  }

  .hidden { display: none !important; }

  /* REPRODUCTOR ESTILO RED CIRCLE (JOHN WICK) */
  .music-player {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: #ffffff;
    border: 3px solid var(--c-dark-1);
    border-radius: 50px;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    box-shadow: 0 5px 0px var(--c-dark-1);
    z-index: 100;
    cursor: pointer;
    transition: all 0.1s;
  }
  
  .music-player:active {
    transform: translateY(5px);
    box-shadow: 0 0px 0px var(--c-dark-1);
  }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="container-card">

  <!-- ================= PANTALLA 1: LOG IN ================= -->
  <section id="panel-busqueda">
    <h2>Welcome</h2>
    <p class="subtitle">Ingresa el número de identidad para desplegar el expediente académico tridimensional.</p>

    <div class="search-box">
      <input type="text" id="txt-identidad" placeholder="0801199012345" maxlength="13">
      <button class="btn-submit" onclick="buscarCalificaciones()">Acceder al Sistema</button>
      <div id="error-box" class="error-msg"></div>
    </div>
  </section>

  <!-- ================= PANTALLA 2: BOLETA ALUMNO ================= -->
  <section id="panel-boleta" class="hidden">
    <h2 id="lbl-nombre" style="text-align: left; font-size: 26px;">Estudiante</h2>
    <p class="subtitle" id="lbl-identidad" style="text-align: left; margin-bottom: 25px;">ID: 0000000000000</p>

    <div class="profile-area">
      <div class="profile-circle" id="avatar-preview">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#190019" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div>
        <span style="display:block; font-size:12px; font-weight:800; margin-bottom:6px; color: var(--c-dark-1);">Registro Fotográfico</span>
        <label class="file-input-label">
          Subir Archivo
          <input type="file" id="photo-upload" accept="image/*" style="display: none;" onchange="previewImage(event)">
        </label>
      </div>
    </div>

    <div id="materias-container"></div>

    <button class="btn-submit btn-logout" onclick="salirSistema()">Cerrar Sesión Activa</button>
  </section>
</div>

<!-- CONTROL DE AUDIO ESTILO JOHN WICK: "THE RED CIRCLE" CLUB INSTRUMENTAL -->
<div class="music-player" onclick="toggleMusic()">
  <span id="music-icon">🔥</span>
  <span id="music-text">Red Circle Mix: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;

function cargarBaseDatos() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(response => { if (!response.ok) throw new Error(); return response.json(); })
    .then(data => { NOTAS_ALUMNOS = data; })
    .catch(err => { console.error("Error de sincronización."); });
}

function buscarCalificaciones() {
  const idBusqueda = document.getElementById('txt-identidad').value.trim();
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (idBusqueda.length !== 13) {
    errorBox.textContent = "Error: El número de identidad debe contener exactamente 13 dígitos.";
    errorBox.style.display = 'block';
    return;
  }

  if (!NOTAS_ALUMNOS) {
    errorBox.textContent = "Error del servidor: Base de datos no enlazada.";
    errorBox.style.display = 'block';
    return;
  }

  const alumno = NOTAS_ALUMNOS[idBusqueda];
  if (!alumno) {
    errorBox.textContent = "No se encontró ningún expediente asociado a esa identidad.";
    errorBox.style.display = 'block';
    return;
  }

  document.getElementById('lbl-nombre').textContent = alumno.nombre;
  document.getElementById('lbl-identidad').textContent = "Identidad: " + idBusqueda;

  const container = document.getElementById('materias-container');
  container.innerHTML = '';

  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia];
    const divMateria = document.createElement('div');
    
    divMateria.innerHTML = `
      <div class="materia-title">
        <span>#{ ${materia.replace(/_/g, ' ').toUpperCase()} }</span>
        <span class="promedio-badge">PROMEDIO: ${notas.promedioAnual}%</span>
      </div>
      <div class="parciales-list"></div>
    `;
    
    const parcialesList = divMateria.querySelector('.parciales-list');
    const parciales = ['I', 'II', 'III', 'IV'];

    parciales.forEach(p => {
      const pData = notas[p];
      let nombresAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct && pData.nombresAct.length === 6) {
        nombresAct = pData.nombresAct;
      }

      const blockParcial = document.createElement('div');
      blockParcial.className = 'parcial-block';
      
      if (!(pData && pData.cursado)) {
        blockParcial.style.opacity = "0.3";
      }

      let gridHtml = '';
      let listaActs = pData && pData.act ? pData.act : Array(6).fill('');

      for(let i=0; i<6; i++) {
        gridHtml += `
          <div class="act-box">
            <div class="act-title">${nombresAct[i]}</div>
            <div class="act-score">${listaActs[i] !== '' ? listaActs[i] : '-'}</div>
          </div>
        `;
      }

      blockParcial.innerHTML = `
        <div class="parcial-header">
          <span>${p} PARCIAL</span>
          <span style="font-family:'Montserrat',sans-serif; font-weight:800; font-size:13px;">NOTA: ${pData && pData.cursado ? pData.total + '%' : '-'}</span>
        </div>
        <div class="grid-activities">${gridHtml}</div>
        <div class="score-summary-inline">
          <span>Acumulado: ${pData && pData.cursado ? pData.acum.toFixed(1) : '-'} / 50</span>
          <span>Examen: ${pData && pData.cursado ? pData.examen : '-'} / 50</span>
        </div>
      `;
      parcialesList.appendChild(blockParcial);
    });

    container.appendChild(divMateria);
  });

  document.getElementById('panel-busqueda').classList.add('hidden');
  document.getElementById('panel-boleta').classList.remove('hidden');
}

function salirSistema() {
  document.getElementById('txt-identidad').value = '';
  document.getElementById('panel-boleta').classList.add('hidden');
  document.getElementById('panel-busqueda').classList.remove('hidden');
}

function previewImage(event) {
  const reader = new FileReader();
  reader.onload = function() {
    document.getElementById('avatar-preview').innerHTML = `<img src="${reader.result}">`;
  }
  reader.readAsDataURL(event.target.files[0]);
}

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) {
    audio.play().catch(() => {});
    document.getElementById('music-text').innerText = "Red Circle Mix: On";
    document.getElementById('music-icon').innerText = "⏸️";
    musicPlaying = true;
  } else {
    audio.pause();
    document.getElementById('music-text').innerText = "Red Circle Mix: Off";
    document.getElementById('music-icon').innerText = "🔥";
    musicPlaying = false;
  }
}

window.onload = cargarBaseDatos;
</script>
</body>
</html>
