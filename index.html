<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal de Calificaciones Oficial · Instituto Polivalente San Pedro de Tutule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --c-cream-bg: #FBE4D8;   
    --c-nude-soft: #DFB6B2;  
    --c-berry-accent: #854F6C; 
    --c-plum-text: #522B5B;    
    --c-fine-dark: #2B124C;    
    --shadow-floating: 0 30px 60px rgba(82, 43, 91, 0.15), 0 12px 25px rgba(0, 0, 0, 0.04);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #FFFFFF 0%, var(--c-cream-bg) 50%, var(--c-nude-soft) 100%);
    background-attachment: fixed;
    color: var(--c-fine-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 60px 20px;
    position: relative;
    overflow-x: hidden;
  }

  header { text-align: center; margin-bottom: 40px; z-index: 10; }
  .inst-title { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 600; color: var(--c-fine-dark); line-height: 1.3; max-width: 800px; margin: 0 auto; }
  .docente-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; font-weight: 600; color: var(--c-berry-accent); margin-top: 10px; letter-spacing: 2px; }

  .container-card {
    background: #FFFFFF;
    border: 1px solid rgba(223, 182, 178, 0.5);
    border-radius: 32px; 
    max-width: 560px;
    width: 100%;
    margin: 0 auto 60px auto;
    padding: 50px 45px;
    position: relative;
    z-index: 5;
    box-shadow: 0 40px 80px rgba(82, 43, 91, 0.06);
  }

  .institution-logo-container { display: flex; justify-content: center; margin-bottom: 30px; }
  .institution-logo {
    width: 130px; height: 130px; object-fit: contain; border-radius: 50%; background: #FFFFFF; padding: 4px; border: 2px solid var(--c-nude-soft);
    box-shadow: 0 12px 28px rgba(82, 43, 91, 0.08);
  }

  h2 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 400; margin-bottom: 12px; text-align: center; color: var(--c-fine-dark); }
  .subtitle { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--c-berry-accent); text-align: center; margin-bottom: 45px; }

  .search-box { display: flex; flex-direction: column; gap: 30px; }
  input[type="text"] {
    width: 100%; border: none; border-bottom: 1px solid var(--c-nude-soft); background: transparent; padding: 15px 0;
    font-family: 'Inter', sans-serif; font-size: 22px; color: var(--c-fine-dark); outline: none; text-align: center; letter-spacing: 6px;
  }
  input[type="text"]:focus { border-bottom: 2px solid var(--c-berry-accent); }

  .btn-submit {
    display: block; width: 100%; background: var(--c-plum-text); color: #FFFFFF; border: none; padding: 20px; border-radius: 14px;
    font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; letter-spacing: 3px; cursor: pointer; margin-top: 15px;
    text-transform: uppercase; box-shadow: 0 10px 25px rgba(82, 43, 91, 0.2); transition: all 0.3s;
  }
  .btn-submit:hover { background: var(--c-fine-dark); transform: translateY(-2px); }

  .btn-logout { background: transparent; color: var(--c-berry-accent); font-size: 11px; padding: 12px; margin-top: 50px; border: 1px solid var(--c-nude-soft); border-radius: 8px; box-shadow: none; }
  .btn-logout:hover { background: rgba(223, 182, 178, 0.15); transform: none; }

  .profile-area { display: flex; align-items: center; gap: 25px; background: var(--c-cream-bg); padding: 20px; border-radius: 20px; margin-bottom: 45px; border: 1px solid rgba(223, 182, 178, 0.3); }
  .profile-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--c-berry-accent); background: #FFFFFF; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info-text { font-family: 'Inter', sans-serif; color: var(--c-fine-dark); }
  .profile-info-title { font-size: 13px; font-weight: 600; text-transform: uppercase; color: var(--c-plum-text); }
  .profile-info-desc { font-size: 12px; color: var(--c-berry-accent); margin-top: 2px; }

  .materia-title {
    font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 600; margin-top: 60px; margin-bottom: 35px;
    display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--c-cream-bg); padding-bottom: 15px; color: var(--c-plum-text);
  }
  .promedio-badge { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; background: var(--c-cream-bg); color: var(--c-fine-dark); padding: 8px 18px; border-radius: 30px; border: 1px solid var(--c-nude-soft); }

  .parcial-block {
    border: 1px solid rgba(223, 182, 178, 0.3); border-radius: 24px; padding: 28px; margin-bottom: 45px; background: #FFFFFF; box-shadow: var(--shadow-floating);
    animation: floatingAnimation 4.5s ease-in-out infinite alternate;
  }
  @keyframes floatingAnimation { 0% { transform: translateY(0px); } 100% { transform: translateY(-8px); } }

  .parcial-header { font-family: 'Playfair Display', serif; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 20px; color: var(--c-fine-dark); border-bottom: 1px solid var(--c-cream-bg); padding-bottom: 12px; }
  .grid-activities { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 25px; }
  .act-box { background: rgba(251, 228, 216, 0.4); border-radius: 14px; padding: 16px 6px; text-align: center; border: 1px solid rgba(223, 182, 178, 0.2); }
  .act-title { font-size: 11px; font-weight: 600; color: var(--c-berry-accent); text-transform: uppercase; }
  .act-score { font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 600; margin-top: 8px; color: var(--c-fine-dark); }

  .score-summary-inline { display: flex; justify-content: space-between; font-size: 12px; font-weight: 500; margin-top: 25px; background: #FFFFFF; padding: 14px 18px; border-radius: 12px; border: 1px solid var(--c-nude-soft); }
  .error-msg { color: #A34343; font-size: 13px; margin-top: 15px; text-align: center; font-weight: 500; display: none; }
  .hidden { display: none !important; }

  .music-player { position: fixed; bottom: 35px; right: 35px; background: #ffffff; border: 1px solid var(--c-nude-soft); border-radius: 30px; padding: 12px 24px; display: flex; align-items: center; gap: 12px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 10px 30px rgba(82, 43, 91, 0.06); z-index: 100; cursor: pointer; color: var(--c-fine-dark); transition: all 0.3s; }
</style>
</head>
<body>

<header>
  <div class="inst-title">Instituto Polivalente San Pedro de Tutule</div>
  <div class="docente-name">Profa. Karla Castro</div>
</header>

<div class="container-card">
  <div class="institution-logo-container">
    <img src="logo.png" alt="Logo" class="institution-logo" onerror="this.onerror=null; this.src='WhatsApp Image 2026-02-18 at 5.01.18 PM.jpeg';">
  </div>

  <section id="panel-busqueda">
    <h2>Bienvenido</h2>
    <p class="subtitle">Ingrese las credenciales del estudiante para acceder al registro privado.</p>
    <div class="search-box">
      <input type="text" id="txt-identidad" placeholder="0801199012345" maxlength="13">
      <button class="btn-submit" onclick="buscarCalificaciones()">Acceder al Portal</button>
      <div id="error-box" class="error-msg"></div>
    </div>
  </section>

  <section id="panel-boleta" class="hidden">
    <h2 id="lbl-nombre" style="text-align: left; font-size: 28px;">Estudiante</h2>
    <p class="subtitle" id="lbl-identidad" style="text-align: left; margin-bottom: 30px;">ID: 0000000000000</p>

    <div class="profile-area">
      <div class="profile-circle" id="avatar-preview"></div>
      <div class="profile-info-text">
        <div class="profile-info-title">Fotografía de Matrícula</div>
        <div class="profile-info-desc">Expediente oficial verificado.</div>
      </div>
    </div>

    <div id="materias-container"></div>
    <button class="btn-submit btn-logout" onclick="salirSistema()">Finalizar Consulta</button>
  </section>
</div>

<div class="music-player" onclick="toggleMusic()">
  <span id="music-icon">🎹</span> <span id="music-text">Piano Acústico: Off</span>
  <audio id="bg-audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"></audio>
</div>

<script>
let NOTAS_ALUMNOS = null;
function cargarBaseDatos() {
  fetch('notas_alumnos.json?t=' + new Date().getTime())
    .then(res => res.json()).then(data => { NOTAS_ALUMNOS = data; }).catch(() => {});
}

function buscarCalificaciones() {
  const id = document.getElementById('txt-identidad').value.trim();
  const errorBox = document.getElementById('error-box');
  errorBox.style.display = 'none';

  if (id.length !== 13 || !NOTAS_ALUMNOS || !NOTAS_ALUMNOS[id]) {
    errorBox.textContent = "Verifique el número de identidad ingresado.";
    errorBox.style.display = 'block'; return;
  }

  const alumno = NOTAS_ALUMNOS[id];
  document.getElementById('lbl-nombre').textContent = alumno.nombre;
  document.getElementById('lbl-identidad').textContent = "Expediente Oficial ID: " + id;

  const avatar = document.getElementById('avatar-preview');
  avatar.innerHTML = alumno.foto ? `<img src="${alumno.foto}">` : `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2B124C" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`;

  const container = document.getElementById('materias-container'); container.innerHTML = '';

  Object.keys(alumno.asignaturas).forEach(materia => {
    const notas = alumno.asignaturas[materia];
    const div = document.createElement('div');
    div.innerHTML = `<div class="materia-title"><span>${materia.replace(/_/g, ' ').toUpperCase()}</span><span class="promedio-badge">Anual: ${notas.promedioAnual}%</span></div><div class="p-list"></div>`;
    
    const pList = div.querySelector('.p-list');
    ['I', 'II', 'III', 'IV'].forEach(p => {
      const pData = notas[p];
      let nAct = ["v(5)", "D(5)", "Plataf(5)", "FM(10)", "Rev.(10)", "Guia(15)"];
      if (pData && pData.nombresAct) nAct = pData.nombresAct;

      const block = document.createElement('div'); block.className = 'parcial-block';
      if (!(pData && pData.cursado)) block.style.opacity = "0.35";

      let grid = '';
      let lActs = pData && pData.act ? pData.act : Array(6).fill('');
      for(let i=0; i<6; i++) {
        grid += `<div class="act-box"><div class="act-title">${nAct[i]}</div><div class="act-score">${lActs[i] !== '' ? lActs[i] : '-'}</div></div>`;
      }

      block.innerHTML = `
        <div class="parcial-header"><span>Periodo ${p}</span><span>Eva: ${pData && pData.cursado ? pData.total+'%' : '-'}</span></div>
        <div class="grid-activities">${grid}</div>
        <div class="score-summary-inline"><span>Acumulado: ${pData && pData.cursado ? pData.acum : '-'} / 50</span><span>Examen: ${pData && pData.cursado ? pData.examen : '-'} / 50</span></div>
      `;
      pList.appendChild(block);
    });
    container.appendChild(div);
  });

  document.getElementById('panel-busqueda').classList.add('hidden');
  document.getElementById('panel-boleta').classList.remove('hidden');
}

function salirSistema() { document.getElementById('txt-identidad').value = ''; document.getElementById('panel-boleta').classList.add('hidden'); document.getElementById('panel-busqueda').classList.remove('hidden'); }

let musicPlaying = false;
function toggleMusic() {
  const audio = document.getElementById('bg-audio');
  if(!musicPlaying) { audio.play().catch(()=>{}); document.getElementById('music-text').innerText = "Piano Acústico: On"; musicPlaying = true; }
  else { audio.pause(); document.getElementById('music-text').innerText = "Piano Acústico: Off"; musicPlaying = false; }
}
window.onload = cargarBaseDatos;
</script>
</body>
</html>
